---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run yamllint
        run: |
          pip install --break-system-packages yamllint
          yamllint -c .yamllint ansible .github

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v26.4.0
        with:
          working_directory: ansible

  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Arch Linux
            dockerfile: Dockerfile.archlinux
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build and run
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          docker build \
            --secret id=sops_age_key,env=SOPS_AGE_KEY \
            -f docker/${{ matrix.dockerfile }} \
            .
            