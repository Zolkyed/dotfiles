---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            dockerfile: Dockerfile.ubuntu
          - name: Arch Linux
            dockerfile: Dockerfile.archlinux
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and run
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          docker build \
            --secret id=sops_age_key,env=SOPS_AGE_KEY \
            -f ${{ matrix.dockerfile }} \
            .