---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ansible:
    name: Ansible checks (${{ matrix.name }})
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian
            container: debian:stable
            install: |
              apt-get update
              apt-get install -y --no-install-recommends \
                ansible \
                ansible-lint \
                ca-certificates \
                git \
                ripgrep \
                shellcheck \
                yamllint
          - name: Arch Linux
            container: archlinux:latest
            install: |
              pacman -Syu --noconfirm \
                ansible \
                ansible-lint \
                ca-certificates \
                git \
                ripgrep \
                shellcheck \
                yamllint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install CI dependencies
        run: ${{ matrix.install }}

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible syntax check
        working-directory: ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
        run: ansible-playbook playbooks/setup.yml --syntax-check

      - name: Ansible inventory check
        working-directory: ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
        run: ansible-inventory -i inventory/hosts.yml --list >/dev/null

      - name: Ansible task listing
        working-directory: ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
        run: ansible-playbook playbooks/setup.yml --list-tasks

      - name: Ansible tag coverage
        working-directory: ansible
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
          ANSIBLE_REMOTE_TEMP: /tmp/ansible-remote
          TAGS: >-
            always package_cache sysctl btrfs user aur packages hayase
            locale fonts flatpak docker nvidia virtualization dotfiles browser ssh_keys dev
            bin networking vpn sshd firewall fail2ban bluetooth pipewire splashboot bootloader
            snapper grub_btrfs display_manager rclone konsave konsave-import konsave-export
            konsave-delete keybinds ai gaming hyprland niri
        run: |
          for tag in $TAGS; do
            output=$(ansible-playbook playbooks/setup.yml --list-tasks --tags "$tag" 2>&1)
            status=$?
            task_count=$(printf '%s\n' "$output" | rg -c '^      .+TAGS:')

            if [[ "$status" -ne 0 || "$task_count" -eq 0 ]]; then
              printf 'FAIL %s status=%s tasks=%s\n%s\n' "$tag" "$status" "$task_count" "$output"
              exit 1
            fi

            printf 'PASS %-18s %s tasks\n' "$tag" "$task_count"
          done

      - name: Ansible lint
        working-directory: ansible
        run: ansible-lint

      - name: YAML lint
        run: yamllint -c .yamllint ansible .github

      - name: Shell lint
        run: shellcheck scripts/*.sh
