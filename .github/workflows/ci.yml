---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-checks:
    name: Docker checks (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            dockerfile: Dockerfile.ubuntu
            image: dotfiles-ansible-test-ubuntu
          - name: Arch Linux
            dockerfile: Dockerfile.archlinux
            image: dotfiles-ansible-test-archlinux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build test image
        env:
          DOCKER_BUILDKIT: "1"
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: >-
          docker build
          --secret id=sops_age_key,env=SOPS_AGE_KEY
          -f ${{ matrix.dockerfile }}
          -t ${{ matrix.image }}
          .
