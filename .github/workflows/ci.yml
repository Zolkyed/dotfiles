name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install ansible ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/setup.yml
        env:
          ANSIBLE_FORCE_COLOR: "1"

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Syntax check
        run: |
          cd ansible
          ansible-playbook playbooks/setup.yml --syntax-check \
            -i "localhost," \
            -e "ansible_connection=local" \
            -e "user_name=runner" \
            -e "user_home=/home/runner" \
            -e "machine_type=desktop" \
            -e "desktop_environment=kde"

  dry-run:
    name: Dry Run (check mode)
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update -y
          apt-get install -y ansible python3-apt curl sudo git

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Create test user
        run: useradd -m -s /bin/bash runner || true

      - name: Run playbook in check mode
        run: |
          cd ansible
          ansible-playbook playbooks/setup.yml \
            --check \
            --skip-tags "reboot,nvidia,konsave" \
            -i "localhost," \
            -e "ansible_connection=local" \
            -e "user_name=runner" \
            -e "user_home=/home/runner" \
            -e "machine_type=desktop" \
            -e "desktop_environment=kde" \
            -e "ansible_become_password=''" \
        continue-on-error: true
