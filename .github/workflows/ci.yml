name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # This allows the overall pipeline to pass even if linting fails
    continue-on-error: true 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Tools
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: yamllint -c .yamllint ansible .github

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v24
        with:
          working_directory: ansible

  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    # We use 'if: always()' so this runs even if the lint job is skipped or fails
    # though since they are parallel now, 'needs' isn't strictly required.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Arch Linux
            dockerfile: Dockerfile.archlinux
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.dockerfile }}
          push: false
          load: true 
          secrets: |
            "sops_age_key=${{ secrets.SOPS_AGE_KEY }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max