---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show tool versions
        run: |
          ansible --version
          ansible-lint --version
          yamllint --version
          shellcheck --version

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run yamllint
        run: yamllint -c .yamllint ansible .github

      - name: Run shellcheck
        run: shellcheck scripts/*.sh

      - name: Run ansible-lint
        run: ansible-lint -c ansible/.ansible-lint.yml ansible
        env:
          ANSIBLE_CONFIG: ./ansible/ansible.cfg

  integration:
    name: Integration (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Arch Linux
            dockerfile: Dockerfile.archlinux

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and run
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.dockerfile }}
          push: false
          load: true
          provenance: false
          cache-from: type=gha,scope=${{ matrix.dockerfile }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}
          secrets: |
            "sops_age_key=${{ secrets.SOPS_AGE_KEY }}"
