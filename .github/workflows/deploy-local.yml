---
name: Deploy (Local)

on:
  workflow_dispatch:
    inputs:
      host:
        description: Target host
        required: true
        default: desktop
        type: choice
        options:
          - desktop
          - laptop
          - server
      tags:
        description: "Ansible tags, comma-separated (leave empty for all)"
        required: false
        default: ""

permissions:
  contents: read

env:
  SOPS_VERSION: "3.9.4"

jobs:
  prepare:
    name: Prepare for local run on ${{ inputs.host }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install sops
        run: |
          curl -fsSL \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" \
            -o /tmp/sops
          sudo install -m 755 /tmp/sops /usr/local/bin/sops

      - name: Decrypt vault files
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          find ansible/inventory -name 'vault.yml' | while read -r f; do
            sops --decrypt "$f" > "$f.tmp"
            mv "$f.tmp" "$f"
          done

      - name: Package for local run
        run: tar czf ansible-ready.tar.gz ansible/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-ready-${{ inputs.host }}
          path: ansible-ready.tar.gz
          retention-days: 1
