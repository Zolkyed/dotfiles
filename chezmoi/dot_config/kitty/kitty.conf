# vim:ft=kitty

## name:     Monochrome



# The basic colors
foreground              #cccccc
background              #0f0f0f
selection_foreground    #f0f0f0
selection_background    #333333

# Cursor colors
cursor                  #cccccc
cursor_text_color       #0f0f0f

# Scrollbar colors
scrollbar_handle_color  #444444
scrollbar_track_color   #1a1a1a

# URL color when hovering with mouse
url_color               #aaaaaa

# Kitty window border colors
active_border_color     #888888
inactive_border_color   #333333
bell_border_color       #cccccc

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #0f0f0f
active_tab_background   #aaaaaa
inactive_tab_foreground #888888
inactive_tab_background #1a1a1a
tab_bar_background      #0a0a0a

# Colors for marks (marked text in the terminal)
mark1_foreground #0f0f0f
mark1_background #aaaaaa
mark2_foreground #0f0f0f
mark2_background #888888
mark3_foreground #0f0f0f
mark3_background #cccccc

# The 16 terminal colors

# black
color0 #1a1a1a
color8 #444444

# red
color1 #555555
color9 #777777

# green
color2  #666666
color10 #888888

# yellow
color3  #777777
color11 #999999

# blue
color4  #4a4a4a
color12 #6a6a6a

# magenta
color5  #5a5a5a
color13 #7a7a7a

# cyan
color6  #686868
color14 #8a8a8a

# white
color7  #bbbbbb
color15 #e0e0e0

## ── Keymaps ─────────────────────────────────────────

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5
map ctrl+shift+6        goto_tab 6

# Windows
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f5       start_resizing_window

# Font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Scrollback
map ctrl+shift+h        show_scrollback
map ctrl+shift+g        show_last_command_output

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Hints
map ctrl+shift+e        open_url_with_hints
map ctrl+shift+p>f      kitten hints --type path --program -
map ctrl+shift+p>h      kitten hints --type hash --program -

# Reload config
map ctrl+shift+F5       load_config_file

# Other settings
enable_audio_bell no
confirm_os_window_close 0