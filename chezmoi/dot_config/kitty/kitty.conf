# vim:ft=kitty

## name:     Oxocarbon
## upstream: https://github.com/nyoom-engineering/oxocarbon
## blurb:    IBM Carbon-inspired pitch-black dark theme



# The basic colors
foreground              #f2f4f8
background              #161616
selection_foreground    #f2f4f8
selection_background    #525252

# Cursor colors
cursor                  #f2f4f8
cursor_text_color       #161616

# Scrollbar colors
scrollbar_handle_color  #525252
scrollbar_track_color   #262626

# URL color when hovering with mouse
url_color               #78a9ff

# Kitty window border colors
active_border_color     #78a9ff
inactive_border_color   #525252
bell_border_color       #ee5396

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #161616
active_tab_background   #78a9ff
inactive_tab_foreground #f2f4f8
inactive_tab_background #262626
tab_bar_background      #161616

# Colors for marks (marked text in the terminal)
mark1_foreground #161616
mark1_background #78a9ff
mark2_foreground #161616
mark2_background #be95ff
mark3_foreground #161616
mark3_background #3ddbd9

# The 16 terminal colors

# black
color0 #262626
color8 #393939

# red
color1 #ee5396
color9 #ff7eb6

# green
color2  #42be65
color10 #08bdba

# yellow
color3  #f1c21b
color11 #ffe97b

# blue
color4  #78a9ff
color12 #82cfff

# magenta
color5  #be95ff
color13 #d4bbff

# cyan
color6  #3ddbd9
color14 #33b1ff

# white
color7  #dde1e6
color15 #f2f4f8

## ── Keymaps ─────────────────────────────────────────

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5
map ctrl+shift+6        goto_tab 6

# Windows
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window
map ctrl+shift+f5       start_resizing_window

# Font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Scrollback
map ctrl+shift+h        show_scrollback
map ctrl+shift+g        show_last_command_output

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Hints
map ctrl+shift+e        open_url_with_hints
map ctrl+shift+p>f      kitten hints --type path --program -
map ctrl+shift+p>h      kitten hints --type hash --program -

# Reload config
map ctrl+shift+F5       load_config_file

# Other settings
enable_audio_bell no
confirm_os_window_close 0