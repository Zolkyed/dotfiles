---
profile: production

warn_list:
  - yaml[line-length]
  - experimental

exclude_paths:
  - inventory/group_vars/vault.yml
  - inventory/host_vars/*/vault.yml

skip_list:
  - role-name                   # nested role paths (user/bin etc.) don't follow galaxy naming
  - no-changed-when             # some command tasks intentionally always report changed
  - var-naming[no-role-prefix]  # leaf-name prefix convention; linter misreads nested role paths as parent-dir prefix

use_default_rules: true
