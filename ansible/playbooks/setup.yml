---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
      become: false
      no_log: true

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
      become: false
      no_log: true

    - name: Load profile data
      tags: always
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/archlinux.yml"

    - name: Build active profile lists
      tags: always
      ansible.builtin.set_fact:
        enabled_profiles: "{{ presets[active_preset].profiles | default([]) }}"
        package_profiles: "{{ (always_profiles + (presets[active_preset].profiles | default([]))) | unique }}"

  roles:
    # --- Base ---
    - role: system/sysctl
      tags: sysctl
    - role: user/account
      tags: user
    - role: system/sudoers
      tags: sudoers

    # --- Package managers / packages ---
    - role: system/pacman
      tags: pacman
    - role: system/aur
      tags: aur
    - role: system/packages
      tags: packages

    # --- Core system services ---
    - role: system/networking
      tags: networking
    - role: system/sshd
      tags: sshd
    - role: system/firewall
      tags: firewall
      when: "'firewall' in enabled_profiles"
    - role: system/fail2ban
      tags: fail2ban
      when: "'fail2ban' in enabled_profiles"
    - role: system/audio
      tags: audio
      when: "'audio' in enabled_profiles"
    - role: system/bluetooth
      tags: bluetooth
      when: "'bluetooth' in enabled_profiles"

    # --- Hardware / boot ---
    - role: system/nvidia
      tags: nvidia
      when: "'nvidia' in enabled_profiles"
    - role: system/snapshot
      tags: snapshot
      when: "'snapshot' in enabled_profiles"
    - role: system/splashboot
      tags: splashboot
      when: "'splashboot' in enabled_profiles"
    - role: system/bootloader
      tags: bootloader
      when: "'bootloader' in enabled_profiles"

    # --- Containers / virtualization ---
    - role: system/docker
      tags: docker
      when: "'docker' in enabled_profiles"
    - role: system/virtualization
      tags: virtualization
      when: "'virtualization' in enabled_profiles"

    # --- Desktop ---
    - role: system/fonts
      tags: fonts
    - role: desktop/plasma
      tags: plasma
      when: "'plasma' in enabled_profiles"

    # --- Apps ---
    - role: apps/flatpak
      tags: flatpak
      when: "'flatpak' in enabled_profiles"
    - role: apps/mihon
      tags: mihon
      when: "'mihon' in enabled_profiles"
    - role: apps/browser
      tags: browser
      when: "'browser' in enabled_profiles"
    - role: apps/ai
      tags: ai
      when: "'ai' in enabled_profiles"
    - role: apps/rclone
      tags: rclone
      when: "'rclone' in enabled_profiles"
    - role: apps/konsave
      tags: konsave
      when: "'konsave' in enabled_profiles"
    - role: apps/appimage
      tags: appimage

    # --- User config ---
    - role: user/ssh_keys
      tags: ssh_keys
    - role: user/bin
      tags: bin
    - role: user/xdg
      tags: xdg
      when: "'xdg' in enabled_profiles"
    - role: user/dotfiles
      tags: dotfiles
