---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load encrypted secrets
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../../secrets/vault.yml"
      become: false
      ignore_errors: true

  roles:
    - role: system/packages
    - role: home/user
    - role: system/fonts
    - role: system/flatpak
    - role: system/docker
    - role: system/nvidia
      when: machine_type == "desktop"
    - role: system/vm
    - role: home/dotfiles
    - role: home/git
    - role: home/ssh_keys
    - role: home/dev
    - role: home/bin
    - role: system/networking
    - role: system/ssh
    - role: system/bluetooth
    - role: system/bootloader
    - role: system/display_manager
    - role: desktop/kde
    - role: system/gaming
      when: machine_type == "desktop"
