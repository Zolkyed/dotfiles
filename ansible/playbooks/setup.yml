---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert supported distribution
      tags: always
      ansible.builtin.assert:
        that:
          - ansible_facts["os_family"] | lower in ["debian", "archlinux"]
        fail_msg: >-
          Unsupported distribution {{ ansible_facts["distribution"] }}
          ({{ ansible_facts["os_family"] }} family). Supported: Debian, Arch Linux.

    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
      become: false
      no_log: true

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
      become: false
      no_log: true

    - name: Load distro-specific vars
      tags: always
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/{{ ansible_facts['os_family'] | lower }}.yml"

  roles:
    # --- System foundation ---
    - role: system/sysctl
      tags: sysctl
    - role: home/user
      tags: user
    - role: system/sudoers
      tags: sudoers
    # --- Packages (core installs first) ---
    - role: home/packages
      tags: packages
    - role: system/fonts
      tags: fonts
    - role: desktop/plasma
      tags: plasma
      when: plasma_enabled
    - role: apps/flatpak
      tags: flatpak
      when: flatpak_enabled

    # --- App installs ---
    - role: apps/vscode
      tags: vscode
      when: vscode_enabled
    - role: apps/hayase
      tags: hayase
      when: hayase_enabled
    - role: apps/browser
      tags: browser
      when: browser_enabled
    - role: apps/dev
      tags: dev
      when: dev_enabled
    - role: apps/ai
      tags: ai
      when: ai_enabled
    - role: apps/gaming
      tags: gaming
      when: gaming_enabled
    - role: apps/rclone
      tags: rclone
      when: rclone_enabled
    - role: apps/konsave
      tags: konsave
      when: konsave_enabled

    # --- Containers / VMs ---
    - role: system/nvidia
      tags: nvidia
      when: nvidia_enabled
    - role: system/docker
      tags: docker
      when: docker_enabled
    - role: system/virtualization
      tags: virtualization
      when: virtualization_enabled

    # --- Home / dotfiles (after all tools are installed) ---
    - role: home/ssh_keys
      tags: ssh_keys
    - role: home/bin
      tags: bin
    - role: home/xdg
      tags: xdg
      when: xdg_enabled
    - role: home/dotfiles
      tags: dotfiles

    # --- Network / security hardening ---
    - role: system/networking
      tags: networking
    - role: system/vpn
      tags: vpn
      when: vpn_enabled
    - role: system/sshd
      tags: sshd
    - role: system/firewall
      tags: firewall
      when: firewall_enabled
    - role: system/fail2ban
      tags: fail2ban
      when: fail2ban_enabled

    # --- Desktop (last: depends on everything above) ---
    - role: system/splashboot
      tags: splashboot
      when: splashboot_enabled
    - role: desktop/hyprland
      tags: hyprland
      when: hyprland_enabled
    - role: desktop/niri
      tags: niri
      when: niri_enabled
