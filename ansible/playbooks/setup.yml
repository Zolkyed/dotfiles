---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
      become: false

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
      become: false

    - name: Load distro-specific vars
      tags: always
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/{{ ansible_facts['os_family'] }}.yml"

  roles:
    - role: home/packages
      tags: packages
    - role: home/hayase
      tags: hayase
    - role: home/user
      tags: user
    - role: system/locale
      tags: locale
    - role: system/fonts
      tags: fonts
    - role: system/flatpak
      tags: flatpak
    - role: system/docker
      tags: docker
    - role: system/nvidia
      tags: nvidia
      when: install_nvidia | default(false)
    - role: system/vm
      tags: vm
    - role: home/dotfiles
      tags: dotfiles
    - role: home/ssh_keys
      tags: ssh_keys
    - role: home/dev
      tags: dev
    - role: home/bin
      tags: bin
    - role: system/networking
      tags: networking
    - role: system/ssh
      tags: ssh
    - role: system/bluetooth
      tags: bluetooth
    - role: system/pipewire
      tags: pipewire
    - role: system/bootloader
      tags: bootloader
    - role: system/display_manager
      tags: display_manager
    - role: desktop/kde/rclone
      tags: rclone
    - role: desktop/kde/konsave
      tags: [konsave-import, konsave-export]
    - role: desktop/kde/keybinds
      tags: keybinds
    - role: home/gaming
      tags: gaming
      when: install_gaming | default(false)