---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
      become: false
      no_log: true

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
      become: false
      no_log: true

    - name: Load profile data
      tags: always
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/archlinux.yml"

    - name: Apply preset flags
      tags: always
      ansible.builtin.set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ presets[active_preset] | dict2items }}"

  roles:
    # --- System  ---
    - role: system/sysctl
      tags: sysctl
    - role: user/account
      tags: user
    - role: system/sudoers
      tags: sudoers

    # --- AUR  ---
    - role: apps/aur
      tags: aur

    # --- Packages  ---
    - role: system/packages
      tags: packages
    - role: system/fonts
      tags: fonts
    - role: desktop/plasma
      tags: plasma
      when: plasma_enabled
    - role: apps/flatpak
      tags: flatpak
      when: flatpak_enabled

    # --- Apps  ---
    - role: apps/hayase
      tags: hayase
      when: hayase_enabled
    - role: apps/mihon
      tags: mihon
      when: mihon_enabled
    - role: apps/browser
      tags: browser
      when: browser_enabled
    - role: apps/ai
      tags: ai
      when: dev_enabled
    - role: apps/gaming
      tags: gaming
      when: gaming_enabled
    - role: apps/rclone
      tags: rclone
      when: rclone_enabled
    - role: apps/konsave
      tags: konsave
      when: konsave_enabled
    - role: apps/appimage
      tags: appimage

    # --- Containers / VMs ---
    - role: system/nvidia
      tags: nvidia
      when: nvidia_enabled
    - role: system/docker
      tags: docker
      when: docker_enabled
    - role: system/virtualization
      tags: virtualization
      when: virtualization_enabled

    # --- User / dotfiles  ---
    - role: user/ssh_keys
      tags: ssh_keys
    - role: user/bin
      tags: bin
    - role: user/xdg
      tags: xdg
      when: xdg_enabled
    - role: user/dotfiles
      tags: dotfiles

    # --- Network / security hardening ---
    - role: system/networking
      tags: networking
    - role: system/bluetooth
      tags: bluetooth
      when: bluetooth_enabled
    - role: system/sshd
      tags: sshd
    - role: system/firewall
      tags: firewall
      when: firewall_enabled
    - role: system/fail2ban
      tags: fail2ban
      when: fail2ban_enabled

    # --- Desktop  ---
    - role: system/splashboot
      tags: splashboot
      when: splashboot_enabled
    - role: system/bootloader
      tags: bootloader
      when: bootloader_enabled
