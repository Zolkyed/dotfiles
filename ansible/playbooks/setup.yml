---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
        return_method: facts-only
      become: false
      no_log: true

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
        return_method: facts-only
      become: false
      no_log: true

    - name: Build active feature list
      tags: always
      ansible.builtin.set_fact:
        enabled_features: "{{ presets[active_preset].features | default([]) }}"

  roles:
    # --- Base ---
    - role: system/kernel
      tags: kernel
    - role: user/account
      tags: user
    - role: system/sudoers
      tags: sudoers

    # --- Package managers ---
    - role: system/mirrors
      tags: mirrors
    - role: system/pacman
      tags: pacman
    - role: system/aur
      tags: aur

    # --- Always-on system ---
    - role: system/core
      tags: core
    - role: user/shell
      tags: shell
    - role: system/journald
      tags: journald
    - role: system/networking
      tags: networking
    - role: system/ntp
      tags: ntp
    - role: system/sshd
      tags: sshd
    - role: system/maintenance
      tags: maintenance
    - role: system/fonts
      tags: fonts
    - role: system/microcode
      tags: microcode

    # --- Optional system ---
    - role: system/vpn
      tags: vpn
      when: "'vpn' in enabled_features"
    - role: system/firmware
      tags: firmware
      when: "'firmware' in enabled_features"
    - role: system/firewall
      tags: firewall
      when: "'firewall' in enabled_features"
    - role: system/fail2ban
      tags: fail2ban
      when: "'fail2ban' in enabled_features"
    - role: system/audio
      tags: audio
      when: "'audio' in enabled_features"
    - role: system/bluetooth
      tags: bluetooth
      when: "'bluetooth' in enabled_features"
    - role: system/avahi
      tags: avahi
      when: "'avahi' in enabled_features"

    # --- Hardware / boot ---
    - role: system/nvidia_gpu
      tags: nvidia_gpu
      when: "'nvidia_gpu' in enabled_features"
    - role: system/amd_gpu
      tags: amd_gpu
      when: "'amd_gpu' in enabled_features"
    - role: system/intel_gpu
      tags: intel_gpu
      when: "'intel_gpu' in enabled_features"
    - role: system/snapper
      tags: snapper
      when: "'snapper' in enabled_features"
    - role: system/splashboot
      tags: splashboot
      when: "'splashboot' in enabled_features"
    - role: system/bootloader
      tags: bootloader
      when: "'bootloader' in enabled_features"

    # --- Containers / virtualization ---
    - role: system/docker
      tags: docker
      when: "'docker' in enabled_features"
    - role: system/virtualization
      tags: virtualization
      when: "'virtualization' in enabled_features"

    # --- Desktop environments ---
    - role: desktop/plasma
      tags: plasma
      when: "'plasma' in enabled_features"
    - role: desktop/wayland
      tags: wayland
      when: "'wayland_common' in enabled_features"
    - role: desktop/hyprland
      tags: hyprland
      when: "'hyprland' in enabled_features"
    - role: desktop/niri
      tags: niri
      when: "'niri' in enabled_features"

    # --- Apps ---
    - role: apps/flatpak
      tags: flatpak
      when: "'flatpak' in enabled_features"
    - role: apps/mihon
      tags: mihon
      when: "'mihon' in enabled_features"
    - role: apps/browser
      tags: browser
      when: "'browser' in enabled_features"
    - role: apps/rclone
      tags: rclone
      when: "'rclone' in enabled_features"
    - role: apps/node
      tags: node
      when: "'dev' in enabled_features or 'ai' in enabled_features"
    - role: apps/dev
      tags: dev
      when: "'dev' in enabled_features"
    - role: apps/vscode
      tags: vscode
      when: "'dev' in enabled_features"
    - role: apps/media
      tags: media
      when: "'media' in enabled_features"
    - role: apps/office
      tags: office
      when: "'office' in enabled_features"
    - role: apps/gaming
      tags: gaming
      when: "'gaming' in enabled_features"
    - role: apps/ai
      tags: ai
      when: "'ai' in enabled_features"
    # --- User config ---
    - role: user/ssh_keys
      tags: ssh_keys
    - role: user/bin
      tags: bin
    - role: user/xdg
      tags: xdg
      when: "'xdg' in enabled_features"
    - role: user/dotfiles
      tags: dotfiles
