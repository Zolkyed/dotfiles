---
- name: Full system setup
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert supported distribution
      tags: always
      ansible.builtin.assert:
        that:
          - ansible_facts["os_family"] in ["Debian", "Archlinux"]
        fail_msg: >-
          Unsupported distribution {{ ansible_facts["distribution"] }}
          ({{ ansible_facts["os_family"] }} family). Supported: Debian, Arch Linux.

    - name: Load shared secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/vault.yml"
      become: false
      no_log: true

    - name: Load host secrets
      tags: always
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../inventory/host_vars/{{ inventory_hostname }}/vault.yml"
      become: false
      no_log: true

    - name: Load distro-specific vars
      tags: always
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/group_vars/{{ ansible_facts['os_family'] }}.yml"

  roles:
    - role: system/sysctl
      tags: sysctl
    - role: home/user
      tags: user
    - role: system/sudoers
      tags: sudoers
    - role: system/aur
      tags: aur
      when: ansible_facts["os_family"] == "Archlinux"
    - role: home/packages
      tags: packages
    - role: home/hayase
      tags: hayase
    - role: system/fonts
      tags: fonts
    - role: home/flatpak
      tags: flatpak
    - role: system/docker
      tags: docker
      when: docker_enabled
    - role: system/virtualization
      tags: virtualization
      when: virtualization_enabled
    - role: home/dotfiles
      tags: dotfiles
    - role: home/browser
      tags: browser
    - role: home/ssh_keys
      tags: ssh_keys
    - role: home/dev
      tags: dev
    - role: home/ai
      tags: ai
    - role: home/bin
      tags: bin
    - role: system/networking
      tags: networking
    - role: system/vpn
      tags: vpn
      when: vpn_enabled
    - role: system/sshd
      tags: sshd
    - role: system/firewall
      tags: firewall
      when: firewall_enabled
    - role: system/fail2ban
      tags: fail2ban
      when: fail2ban_enabled
    - role: system/splashboot
      tags: splashboot
      when: splashboot_enabled
    - role: home/rclone
      tags: rclone
    - role: home/konsave
      tags: konsave
    - role: home/gaming
      tags: gaming
      when: gaming_enabled
    - role: desktop/hyprland
      tags: hyprland
      when: hyprland_enabled
    - role: desktop/niri
      tags: niri
      when: niri_enabled
