---
# Feature flag overrides
nvidia_enabled: true
gaming_enabled: true

# Bootloader
grub_timeout: 3
grub_cmdline_linux_default: "quiet splash"
grub_efi_directory: /boot/efi

# Shared monitor config — replace connector name (run hyprctl monitors)
monitors:
  - connector: "DP-1"
    mode: "1920x1080@144"
    scale: 1