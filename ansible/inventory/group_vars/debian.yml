---
# https://www.debian.org/distrib/packages
# https://packages.ubuntu.com/

# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_groups:
  - sudo
  - audio
  - video
  - plugdev
  - netdev

# ---------------------------------------------------------------------------
# Packages
# ---------------------------------------------------------------------------
apt_packages:
  core:
    - curl
    - wget
    - vim
    - htop
    - unzip
    - rsync
    - kitty
    - software-properties-common
    - apt-transport-https
    - ca-certificates
    - gnupg
    - man-db
    - manpages

  utility:
    - ncdu
    - ripgrep
    - vulkan-tools
    - fuse3
    - libfuse2
    - atuin
    - openssl
    - pamixer
    - xdg-utils
    - plocate
    - psmisc
    - gh
    - tmux
    - eza
    - bat
    - fd-find
    - zoxide
    - fzf
    - lazygit
    - git-delta
    - duf
    - procs
    - just
    - trash-cli
    - neovim
    - starship

  fun:
    - cowsay
    - cmatrix
    - figlet
    - lolcat
    - fastfetch

  shell:
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting

  dev:
    - git
    - build-essential
    - pkg-config
    - python3
    - python3-pip
    - python3-venv
    - pipx
    - nodejs
    - npm
    - jq
    - yq
    - httpie
    - ansible-lint
    - yamllint
    - shellcheck
    - pre-commit
    - playwright
    - gcc
    - gdb
    - cmake

  media:
    - mpv
    - ffmpeg
    - ffmpegthumbnailer
    - yt-dlp
    - gimp
    - pavucontrol
    - obs-studio
    - qbittorrent

  office:
    - libreoffice
    - thunderbird

  system_tools:
    - gparted
    - timeshift

  gaming:
    - steam
    - lutris
    - gamemode
    - mangohud
    - libgamemode0
    - libgamemodeauto0
    - goverlay
    - wine
    - winetricks
    - retroarch

  audio:
    - pipewire
    - wireplumber
    - pipewire-pulse
    - pipewire-alsa

  bluetooth:
    - bluez
    - blueman

  networking:
    - network-manager
    - systemd-resolved

  vpn:
    - wireguard-tools
    - openvpn
    - network-manager-openvpn
    - network-manager-openvpn-gnome

  splashboot:
    - plymouth
    - plymouth-themes

  bootloader:
    - grub-pc

  fonts:
    - fonts-noto
    - fonts-noto-cjk
    - fonts-noto-color-emoji
    - fonts-dejavu
    - fonts-liberation
    - fonts-freefont-ttf

  docker_engine:
    - docker-ce
    - docker-ce-cli
    - containerd.io

  docker_plugins:
    - docker-buildx-plugin
    - docker-compose-plugin

  virtualization_kvm:
    - qemu-system-x86
    - libvirt-daemon-system
    - libvirt-clients
    - virtinst
    - virt-manager
    - bridge-utils
    - ovmf

  virtualization_virtualbox:
    - virtualbox
    - virtualbox-ext-pack

  firewall:
    - ufw

  fail2ban:
    - fail2ban

  nvidia:
    - nvidia-driver
    - nvidia-settings
    - firmware-misc-nonfree

  plasma:
    - kde-plasma-desktop
    - plasma-discover
    - dolphin
    - konsole
    - kcalc
    - kde-spectacle

  hyprland: []

  niri: []

# ---------------------------------------------------------------------------
# Apps
# ---------------------------------------------------------------------------
browser_debian_package: brave-browser
vscode_apt_package: code

distro_flatpaks: []

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
docker_group: docker

sshd_package: openssh-server
sshd_service: ssh

libvirt_service: libvirtd

virtualization_user_groups:
  - libvirt
  - kvm
