---
# https://www.debian.org/distrib/packages
# https://packages.ubuntu.com/

# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_groups:
  - sudo
  - audio
  - video
  - plugdev
  - netdev

# ---------------------------------------------------------------------------
# Profiles
# ---------------------------------------------------------------------------
profiles:
  # -----------------------------------------------------------------------
  # Core
  # -----------------------------------------------------------------------
  core:
    apt:
      - curl
      - wget
      - vim
      - htop
      - unzip
      - rsync
      - kitty
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - gnupg
      - man-db
      - manpages

  shell:
    apt:
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting

  utility:
    apt:
      - ncdu
      - ripgrep
      - vulkan-tools
      - fuse3
      - libfuse2
      - atuin
      - openssl
      - pamixer
      - xdg-utils
      - plocate
      - psmisc
      - gh
      - tmux
      - eza
      - bat
      - fd-find
      - zoxide
      - fzf
      - lazygit
      - git-delta
      - duf
      - procs
      - just
      - trash-cli
      - neovim
      - starship

  fun:
    apt:
      - cowsay
      - cmatrix
      - figlet
      - lolcat
      - fastfetch

  fonts:
    apt:
      - fonts-noto
      - fonts-noto-cjk
      - fonts-noto-color-emoji
      - fonts-dejavu
      - fonts-liberation
      - fonts-freefont-ttf

  # -----------------------------------------------------------------------
  # System
  # -----------------------------------------------------------------------
  audio:
    apt:
      - pipewire
      - wireplumber
      - pipewire-pulse
      - pipewire-alsa

  bluetooth:
    apt:
      - bluez
      - blueman

  networking:
    apt:
      - network-manager
      - systemd-resolved

  vpn:
    apt:
      - wireguard-tools
      - openvpn
      - network-manager-openvpn
      - network-manager-openvpn-gnome

  firewall:
    apt:
      - ufw

  fail2ban:
    apt:
      - fail2ban

  sshd:
    apt:
      - openssh-server
    service:
      - ssh

  nvidia:
    apt:
      - nvidia-driver
      - nvidia-settings
      - firmware-misc-nonfree
      - ubuntu-drivers-common

  bootloader:
    apt:
      - grub-pc

  splashboot:
    apt:
      - plymouth
      - plymouth-themes

  system_tools:
    apt:
      - gparted
      - timeshift

  # -----------------------------------------------------------------------
  # Virtualization / Containers
  # -----------------------------------------------------------------------
  docker:
    apt:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    group:
      - docker

  virtualization_kvm:
    apt:
      - qemu-system-x86
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - virt-manager
      - bridge-utils
      - ovmf
    service:
      - libvirtd
    group:
      - libvirt
      - kvm

  virtualization_virtualbox:
    apt:
      - virtualbox
      - virtualbox-ext-pack

  # -----------------------------------------------------------------------
  # Desktop / WM
  # -----------------------------------------------------------------------
  plasma:
    apt:
      - kde-plasma-desktop
      - plasma-discover
      - dolphin
      - konsole
      - kcalc
      - kde-spectacle
      - plasma-discover-backend-flatpak

  hyprland:
    apt: []

  niri:
    apt: []

  # -----------------------------------------------------------------------
  # Applications
  # -----------------------------------------------------------------------
  browser:
    package: brave-browser

  dev:
    apt:
      - git
      - build-essential
      - pkg-config
      - python3
      - python3-pip
      - python3-venv
      - pipx
      - nodejs
      - npm
      - jq
      - yq
      - httpie
      - ansible-lint
      - yamllint
      - shellcheck
      - pre-commit
      - playwright
      - gcc
      - gdb
      - cmake
      - gpg
    package: code
    npm:
      - opencode-ai
      - "@openai/codex"
      - "@anthropic-ai/claude-code"
    flatpak:
      - com.getpostman.Postman
      - net.portswigger.BurpSuite-Community

  flatpak:
    apt:
      - flatpak

  media:
    apt:
      - mpv
      - ffmpeg
      - ffmpegthumbnailer
      - yt-dlp
      - gimp
      - pavucontrol
      - obs-studio
      - qbittorrent
    flatpak:
      - com.spotify.Client

  gaming:
    apt:
      - steam
      - lutris
      - gamemode
      - mangohud
      - libgamemode0
      - libgamemodeauto0
      - goverlay
      - wine
      - winetricks
      - retroarch
    flatpak:
      - com.heroicgameslauncher.hgl
      - net.pcsx2.PCSX2
      - net.davidotek.pupgui2

  office:
    apt:
      - libreoffice
      - thunderbird

  rclone:
    apt:
      - rclone
