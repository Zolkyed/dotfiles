---
# ---------------------------------------------------------------------------
# Home
# ---------------------------------------------------------------------------
user_groups:
  - sudo
  - audio
  - video
  - plugdev
  - netdev

core_packages:
  - curl
  - wget
  - vim
  - htop
  - zsh
  - unzip
  - rsync
  - kitty
  - software-properties-common
  - apt-transport-https
  - ca-certificates
  - gnupg
  - man-db
  - manpages

utility_packages:
  - ncdu
  - ripgrep
  - vulkan-tools
  - fuse3
  - libfuse2
  - atuin
  - openssl
  - pamixer
  - xdg-utils
  - plocate
  - psmisc
  - gh
  - tmux
  - eza
  - bat
  - fd-find
  - zoxide
  - fzf
  - lazygit
  - git-delta
  - duf
  - procs
  - just
  - trash-cli
  - neovim

fun_packages:
  - cowsay
  - cmatrix
  - figlet
  - lolcat
  - fastfetch

# ---------------------------------------------------------------------------
# Apps
# ---------------------------------------------------------------------------
media_packages:
  - mpv
  - ffmpeg
  - yt-dlp
  - gimp
  - pavucontrol
  - obs-studio
  - qbittorrent

office_packages:
  - libreoffice
  - thunderbird

system_tools_packages:
  - gparted
  - timeshift

gaming_packages:
  - steam
  - lutris
  - gamemode
  - mangohud
  - libgamemode0
  - libgamemodeauto0
  - goverlay
  - wine
  - winetricks
  - retroarch

# Flatpak
distro_flatpaks: []
flatpak_discover_backend_packages:
  - plasma-discover-backend-flatpak

# Development
dev_packages:
  - git
  - build-essential
  - pkg-config
  - python3
  - python3-pip
  - python3-venv
  - pipx
  - jq
  - yq
  - httpie
  - ansible-lint
  - yamllint
  - shellcheck
  - pre-commit
  - playwright
  - gcc
  - gdb
  - cmake

# ---------------------------------------------------------------------------
# Desktop
# ---------------------------------------------------------------------------
plasma_packages:
  - kde-plasma-desktop
  - plasma-discover
  - dolphin
  - konsole
  - kcalc
  - kde-spectacle

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------

# Docker
docker_engine_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io

docker_plugin_packages:
  - docker-buildx-plugin
  - docker-compose-plugin

docker_group: docker

# Fonts
fonts_packages:
  - fonts-noto
  - fonts-noto-cjk
  - fonts-noto-color-emoji
  - fonts-dejavu
  - fonts-liberation
  - fonts-freefont-ttf

# Networking / VPN
networking_packages:
  - network-manager
  - systemd-resolved

vpn_packages:
  - wireguard-tools
  - openvpn
  - network-manager-openvpn
  - network-manager-openvpn-gnome

# Splash boot

splashboot_packages:
  - plymouth
  - plymouth-themes

# SSH
sshd_package: openssh-server
sshd_service: ssh

# Virtualization
libvirt_service: libvirtd

virtualization_kvm_packages:
  - qemu-system-x86
  - libvirt-daemon-system
  - libvirt-clients
  - virtinst
  - virt-manager
  - bridge-utils
  - ovmf

virtualization_virtualbox_packages:
  - virtualbox
  - virtualbox-ext-pack

virtualization_user_groups:
  - libvirt
  - kvm
