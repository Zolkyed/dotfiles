# ---------------------------------------------------------------------------
# Packages (AUR)
# ---------------------------------------------------------------------------
aur_packages:
  entertainment:
    - spotify
  gaming:
    - proton-ge-custom-bin
    - heroic-games-launcher-bin
  tools:
    - ventoy-bin
  dev:
    - nvm
  desktop:
    - niri
  browser:
    - brave-bin
  vscode:
    - visual-studio-code-bin

# ---------------------------------------------------------------------------
# Apps
# ---------------------------------------------------------------------------
distro_flatpaks: []

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------
docker_group: docker

sshd_package: openssh
sshd_service: sshd

libvirt_service: libvirtd

virtualization_user_groups:
  - libvirt
  - kvm
