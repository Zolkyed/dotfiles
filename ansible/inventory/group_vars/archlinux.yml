---
# https://archlinux.org/packages/
# https://aur.archlinux.org/packages

# ---------------------------------------------------------------------------
# Profiles
# ---------------------------------------------------------------------------
profiles:
  # -----------------------------------------------------------------------
  # Core
  # -----------------------------------------------------------------------
  core:
    pacman:
      - curl
      - wget
      - vim
      - htop
      - unzip
      - rsync
      - kitty
      - base-devel
      - man-db
      - man-pages

  shell:
    pacman:
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-completions

  utility:
    pacman:
      - ncdu
      - ripgrep
      - vulkan-tools
      - fuse2
      - fuse3
      - atuin
      - openssl
      - pamixer
      - xdg-utils
      - plocate
      - psmisc
      - github-cli
      - tmux
      - eza
      - bat
      - fd
      - zoxide
      - fzf
      - lazygit
      - git-delta
      - duf
      - procs
      - just
      - trash-cli
      - helix
      - neovim
      - starship
      - yazi
    aur:
      - ventoy-bin

  fun:
    pacman:
      - cowsay
      - cmatrix
      - figlet
      - lolcat
      - fastfetch

  fonts:
    pacman:
      - noto-fonts
      - noto-fonts-cjk
      - noto-fonts-emoji
      - ttf-dejavu
      - ttf-liberation
      - gnu-free-fonts

  # -----------------------------------------------------------------------
  # System
  # -----------------------------------------------------------------------
  audio:
    pacman:
      - pipewire
      - wireplumber
      - pipewire-pulse
      - pipewire-alsa

  bluetooth:
    pacman:
      - bluez
      - bluez-utils
      - blueman

  networking:
    pacman:
      - networkmanager

  vpn:
    pacman:
      - wireguard-tools
      - openvpn
      - networkmanager-openvpn

  firewall:
    pacman:
      - ufw

  fail2ban:
    pacman:
      - fail2ban

  sshd:
    pacman:
      - openssh
    service:
      - sshd

  nvidia:
    pacman:
      - nvidia-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings

  bootloader:
    pacman:
      - grub
      - efibootmgr

  splashboot:
    pacman:
      - plymouth

  system_tools:
    pacman:
      - gparted
      - timeshift

  # -----------------------------------------------------------------------
  # Virtualization / Containers
  # -----------------------------------------------------------------------
  docker:
    pacman:
      - docker
      - docker-compose
      - docker-buildx
    group:
      - docker

  virtualization_kvm:
    pacman:
      - qemu-full
      - libvirt
      - virt-install
      - virt-manager
      - edk2-ovmf
    service:
      - libvirtd
    group:
      - libvirt
      - kvm

  virtualization_virtualbox:
    pacman:
      - virtualbox
      - virtualbox-host-modules-arch

  # -----------------------------------------------------------------------
  # Desktop / WM
  # -----------------------------------------------------------------------
  plasma:
    pacman:
      - plasma-desktop
      - sddm
      - sddm-kcm
      - xdg-desktop-portal-kde
      - plasma-pa
      - plasma-nm
      - kscreen
      - powerdevil
      - bluedevil
      - plasma-systemmonitor
      - breeze-gtk
      - discover
      - dolphin
      - konsole
      - spectacle
      - kcalc
      - ark

  hyprland:
    pacman:
      - hyprland
      - xdg-desktop-portal-hyprland
      - waybar
      - rofi
      - wl-clipboard
      - grim
      - slurp
      - brightnessctl
      - playerctl
      - network-manager-applet
      - swaylock
      - swayidle
      - hyprpaper

  niri:
    pacman:
      - xdg-desktop-portal-wlr
      - waybar
      - rofi
      - mako
      - swaylock
      - swayidle
      - wl-clipboard
      - grim
      - slurp
      - brightnessctl
      - playerctl
      - network-manager-applet
    aur:
      - niri

  # -----------------------------------------------------------------------
  # Applications
  # -----------------------------------------------------------------------
  browser:
    aur:
      - brave-bin

  dev:
    pacman:
      - git
      - pkgconf
      - python
      - python-pip
      - python-pipx
      - nodejs
      - npm
      - rustup
      - jq
      - yq
      - httpie
      - ansible-lint
      - yamllint
      - shellcheck
      - pre-commit
      - python-playwright
      - gcc
      - gdb
      - cmake
    aur:
      - nvm
      - visual-studio-code-bin
    flatpak:
      - com.getpostman.Postman
      - net.portswigger.BurpSuite-Community

  ai:
    npm:
      - opencode-ai
      - "@openai/codex"
      - "@anthropic-ai/claude-code"

  flatpak:
    pacman:
      - flatpak

  media:
    pacman:
      - mpv
      - ffmpeg
      - ffmpegthumbnailer
      - yt-dlp
      - gimp
      - pavucontrol
      - obs-studio
      - qbittorrent
      - discord
    aur:
      - spotify
    flatpak:
      - com.spotify.Client

  gaming:
    pacman:
      - steam
      - lutris
      - gamemode
      - mangohud
      - goverlay
      - wine
      - winetricks
      - protontricks
      - retroarch
    aur:
      - proton-ge-custom-bin
      - heroic-games-launcher-bin
    flatpak:
      - com.heroicgameslauncher.hgl
      - net.pcsx2.PCSX2
      - net.davidotek.pupgui2

  office:
    pacman:
      - libreoffice-fresh
      - thunderbird

  rclone:
    pacman:
      - rclone
