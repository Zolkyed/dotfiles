---
# https://archlinux.org/packages/
# https://aur.archlinux.org/packages
# https://flathub.org/en

profiles:
  # -----------------------------------------------------------------------
  # Core
  # -----------------------------------------------------------------------
  core:
    pacman:
      - chezmoi
      - curl
      - wget
      - neovim
      - htop
      - unzip
      - zip
      - rsync
      - kitty
      - base-devel
      - man-db
      - man-pages
      - pciutils
      - xdg-user-dirs

  shell:
    pacman:
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-completions
      - starship
    aur:
      - oh-my-zsh-git
      - fzf-tab

  utility:
    pacman:
      - ncdu
      - ripgrep
      - vulkan-tools
      - fuse3
      - xdg-utils
      - plocate
      - psmisc
      - github-cli
      - tmux
      - eza
      - bat
      - fd
      - zoxide
      - fzf
      - lazygit
      - git-delta
      - duf
      - procs
      - just
      - trash-cli
      - tree
      - helix
      - yazi
      - pacman-contrib
      - lsof
    flatpak:
      - it.mijorus.gearlever

  fun:
    pacman:
      - cowsay
      - cmatrix
      - figlet
      - lolcat
      - fastfetch
      - cava

  fonts:
    pacman:
      - noto-fonts
      - noto-fonts-emoji
      - ttf-dejavu
      - ttf-liberation
      - ttf-roboto
      - inter-font
      - ttf-jetbrains-mono
      - ttf-cascadia-code
      - ttf-font-awesome

  # -----------------------------------------------------------------------
  # System
  # -----------------------------------------------------------------------
  audio:
    pacman:
      - alsa-utils
      - pipewire
      - wireplumber
      - pipewire-pulse
      - pipewire-alsa
      - pipewire-jack
      - rtkit
      - sof-firmware
      - pamixer

  avahi:
    pacman:
      - avahi
      - nss-mdns

  bluetooth:
    pacman:
      - bluez
      - bluez-utils

  networking:
    pacman:
      - networkmanager

  vpn:
    pacman:
      - wireguard-tools

  firewall:
    pacman:
      - ufw

  fail2ban:
    pacman:
      - fail2ban

  sshd:
    pacman:
      - openssh

  maintenance:
    pacman:
      - btrfs-progs
      - pkgfile
      - dosfstools

  firmware:
    pacman:
      - fwupd

  nvidia:
    pacman: []

  bootloader:
    pacman:
      - grub
      - efibootmgr
    aur:
      - grub-hook

  snapper:
    pacman:
      - snapper
      - snap-pac
      - grub-btrfs
      - inotify-tools

  splashboot:
    pacman:
      - plymouth

  # -----------------------------------------------------------------------
  # Virtualization
  # -----------------------------------------------------------------------
  docker:
    pacman:
      - docker
      - docker-compose
      - docker-buildx

  virtualization:
    pacman:
      - qemu-full
      - libvirt
      - virt-install
      - virt-manager
      - edk2-ovmf
      - dnsmasq
      - dmidecode

  # -----------------------------------------------------------------------
  # Desktop
  # -----------------------------------------------------------------------
  plasma:
    pacman:
      - plasma-desktop
      - sddm
      - sddm-kcm
      - xdg-desktop-portal-kde
      - plasma-pa
      - plasma-nm
      - kscreen
      - powerdevil
      - bluedevil
      - plasma-systemmonitor
      - breeze-gtk
      - discover
      - dolphin
      - spectacle
      - kcalc
      - ark
      - kdeconnect
      - wl-clipboard

  wayland_common:
    pacman:
      - waybar
      - rofi
      - grim
      - slurp
      - brightnessctl
      - playerctl
      - network-manager-applet
      - swaylock
      - swayidle

  hyprland:
    pacman:
      - hyprland
      - xdg-desktop-portal-hyprland
      - hyprpaper

  niri:
    pacman:
      - niri
      - xwayland-satellite
      - mako
      - swaybg

  # -----------------------------------------------------------------------
  # Applications
  # -----------------------------------------------------------------------
  browser:
    aur:
      - brave-bin

  dev:
    pacman:
      - pkgconf
      - python
      - python-pip
      - python-pipx
      - rust
      - jq
      - yq
      - httpie
      - ansible-lint
      - yamllint
      - shellcheck
      - pre-commit
      - python-playwright
      - gcc
      - gdb
      - cmake
      - ninja
    aur:
      - visual-studio-code-bin
      - volta-bin
    flatpak:
      - com.getpostman.Postman
      - net.portswigger.BurpSuite-Community

  ai:
    npm:
      - opencode-ai
      - "@openai/codex"
      - "@anthropic-ai/claude-code"

  flatpak:
    pacman:
      - flatpak

  media:
    pacman:
      - mpv
      - ffmpeg
      - ffmpegthumbnailer
      - yt-dlp
      - gimp
      - pavucontrol
      - obs-studio
      - qbittorrent
      - discord
      - python-guessit
      - python-requests
    aur:
      - hayase-desktop-bin
    flatpak:
      - com.spotify.Client

  gaming:
    pacman:
      - steam
      - lutris
      - gamemode
      - mangohud
      - goverlay
      - wine
      - winetricks
      - protontricks
      - retroarch
    aur:
      - proton-ge-custom-bin
      - heroic-games-launcher-bin
    flatpak:
      - net.pcsx2.PCSX2
      - net.davidotek.pupgui2

  office:
    pacman:
      - libreoffice-fresh
      - thunderbird
      - zathura

  rclone:
    pacman:
      - rclone

  konsave:
    pipx:
      - konsave

  # -----------------------------------------------------------------------
  # Graphics Drivers
  # -----------------------------------------------------------------------
  amd_gpu:
    pacman:
      - vulkan-radeon
      - libva-mesa-driver
      - lib32-vulkan-radeon
      - lib32-mesa

  intel_gpu:
    pacman:
      - vulkan-intel
      - intel-media-driver
      - lib32-vulkan-intel
      - lib32-mesa
