---
# https://archlinux.org/packages/
# https://aur.archlinux.org/packages
# https://flathub.org/en

# ---------------------------------------------------------------------------
# Profiles
# ---------------------------------------------------------------------------
profiles:
  # -----------------------------------------------------------------------
  # Core
  # -----------------------------------------------------------------------
  core:
    pacman:
      - curl
      - wget
      - neovim
      - htop
      - unzip
      - rsync
      - kitty
      - base-devel
      - man-db
      - man-pages
      - pciutils

  shell:
    pacman:
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-completions

  utility:
    pacman:
      - ncdu
      - ripgrep
      - vulkan-tools
      - fuse3
      - pamixer
      - xdg-utils
      - plocate
      - psmisc
      - github-cli
      - tmux
      - eza
      - bat
      - fd
      - zoxide
      - fzf
      - lazygit
      - git-delta
      - duf
      - procs
      - just
      - trash-cli
      - helix
      - starship
      - yazi
      - zathura
    flatpak:
      - it.mijorus.gearlever

  fun:
    pacman:
      - cowsay
      - cmatrix
      - figlet
      - lolcat
      - fastfetch
      - cava

  fonts:
    pacman:
      - noto-fonts
      - noto-fonts-emoji
      - ttf-dejavu
      - ttf-liberation
      - ttf-roboto
      - inter-font
      - ttf-jetbrains-mono
      - ttf-cascadia-code

  # -----------------------------------------------------------------------
  # System
  # -----------------------------------------------------------------------
  audio:
    pacman:
      - alsa-utils
      - pipewire
      - wireplumber
      - pipewire-pulse
      - pipewire-alsa
      - pipewire-jack
      - rtkit
      - sof-firmware

  bluetooth:
    pacman:
      - bluez
      - bluez-utils
      - blueman

  networking:
    pacman:
      - networkmanager
      - iwd

  vpn:
    pacman:
      - wireguard-tools

  firewall:
    pacman:
      - ufw

  fail2ban:
    pacman:
      - fail2ban

  sshd:
    pacman:
      - openssh

  nvidia:
    pacman: []

  bootloader:
    pacman:
      - grub
      - efibootmgr

  snapper:
    pacman:
      - snapper
      - snap-pac
      - grub-btrfs

  splashboot:
    pacman:
      - plymouth

  # -----------------------------------------------------------------------
  # Virtualization / Containers
  # -----------------------------------------------------------------------
  docker:
    pacman:
      - docker
      - docker-compose
      - docker-buildx

  virtualization:
    pacman:
      - qemu-full
      - libvirt
      - virt-install
      - virt-manager
      - edk2-ovmf

  # -----------------------------------------------------------------------
  # Desktop / WM
  # -----------------------------------------------------------------------
  plasma:
    pacman:
      - plasma-desktop
      - sddm
      - sddm-kcm
      - xdg-desktop-portal-kde
      - plasma-pa
      - plasma-nm
      - kscreen
      - powerdevil
      - bluedevil
      - plasma-systemmonitor
      - breeze-gtk
      - discover
      - dolphin
      - spectacle
      - kcalc
      - ark
      - kdeconnect

  wayland_common:
    pacman:
      - waybar
      - rofi
      - wl-clipboard
      - grim
      - slurp
      - brightnessctl
      - playerctl
      - network-manager-applet
      - swaylock
      - swayidle

  hyprland:
    pacman:
      - hyprland
      - xdg-desktop-portal-hyprland
      - hyprpaper

  niri:
    pacman:
      - niri
      - xwayland-satellite
      - mako
      - swaybg

  # -----------------------------------------------------------------------
  # Applications
  # -----------------------------------------------------------------------
  browser:
    aur:
      - brave-bin

  dev:
    pacman:
      - git
      - pkgconf
      - python
      - python-pip
      - python-pipx
      - rust
      - jq
      - yq
      - httpie
      - ansible-lint
      - yamllint
      - shellcheck
      - pre-commit
      - python-playwright
      - gcc
      - gdb
      - cmake
    aur:
      - nvm
      - visual-studio-code-bin
    flatpak:
      - com.getpostman.Postman
      - net.portswigger.BurpSuite-Community

  ai:
    npm:
      - opencode-ai
      - "@openai/codex"
      - "@anthropic-ai/claude-code"

  flatpak:
    pacman:
      - flatpak

  media:
    pacman:
      - mpv
      - ffmpeg
      - ffmpegthumbnailer
      - yt-dlp
      - gimp
      - pavucontrol
      - obs-studio
      - qbittorrent
      - discord
    aur:
      - hayase-desktop-bin
    flatpak:
      - com.spotify.Client

  gaming:
    pacman:
      - steam
      - lutris
      - gamemode
      - mangohud
      - goverlay
      - wine
      - winetricks
      - protontricks
      - retroarch
    aur:
      - proton-ge-custom-bin
      - heroic-games-launcher-bin
    flatpak:
      - net.pcsx2.PCSX2
      - net.davidotek.pupgui2

  office:
    pacman:
      - libreoffice-fresh
      - thunderbird

  rclone:
    pacman:
      - rclone
