---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh
user_groups:
  - wheel
  - audio
  - video

# ---------------------------------------------------------------------------
# Presets
# ---------------------------------------------------------------------------
presets:
  # ---------------------------------------------------------------------------
  # DESKTOP
  # ---------------------------------------------------------------------------
  desktop:
    features:
      # --- performance ---
      - zen_kernel
      - cpupower
      # --- hardware ---
      - audio
      - bluetooth
      - firmware
      # --- network ---
      - avahi
      - vpn
      # --- security ---
      - firewall
      - fail2ban
      # --- system ---
      - bootloader
      - snapper
      - plymouth
      # --- containers ---
      - docker
      - virtualization
      # --- desktop ---
      - plasma
      - xdg
      # --- apps ---
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - gaming
      - tools

  # ---------------------------------------------------------------------------
  # LAPTOP
  # ---------------------------------------------------------------------------
  laptop:
    features:
      # --- performance ---
      - zen_kernel
      - cpupower
      # --- hardware ---
      - audio
      - bluetooth
      - firmware
      # --- network ---
      - avahi
      - vpn
      # --- security ---
      - firewall
      - fail2ban
      # --- system ---
      - bootloader
      - snapper
      - plymouth
      # --- containers ---
      - docker
      - virtualization
      # --- desktop ---
      - plasma
      - xdg
      # --- apps ---
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - tools

  # ---------------------------------------------------------------------------
  # SERVER
  # ---------------------------------------------------------------------------
  server:
    features:
      # --- network ---
      - vpn
      # --- security ---
      - firewall
      - fail2ban
      # --- system ---
      - bootloader
      - snapper
      # --- containers ---
      - docker
      - virtualization
