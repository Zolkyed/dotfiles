---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
# Target user — ansible_user should be set in inventory if it differs from user_name
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh

# ---------------------------------------------------------------------------
# Feature flags — defaults off/on globally; override per host in host_vars
# ---------------------------------------------------------------------------

# Boot
grub_enabled: false
splashboot_enabled: false

# Hardware
nvidia_enabled: false
bluetooth_enabled: true

# Audio
pipewire_enabled: true

# Desktop Environments
kde_enabled: true
hyprland_enabled: false
niri_enabled: false

# AI Tools
ai_enabled: true

# Services
display_manager_enabled: true
docker_enabled: true
virtualization_enabled: true
gaming_enabled: false
vpn_enabled: true
firewall_enabled: true
fail2ban_enabled: true

# ---------------------------------------------------------------------------
# System defaults
# ---------------------------------------------------------------------------
system_display_manager: sddm
system_virtualization_backend: kvm   # kvm or virtualbox

system_locale: en_US.UTF-8
system_timezone: America/Toronto
system_keymap: us
system_hostname: "{{ inventory_hostname }}"
system_sysctl_settings: {}

# ---------------------------------------------------------------------------
# Splash boot
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# NVIDIA
# ---------------------------------------------------------------------------
# Arch can use 'auto'. Debian must pin a specific package, e.g. nvidia-driver.
system_nvidia_driver_package: auto
system_nvidia_persistence_enabled: false

# ---------------------------------------------------------------------------
# SSH
# ---------------------------------------------------------------------------
sshd_permit_root_login: "no"
sshd_password_authentication: "no"
sshd_pubkey_authentication: "yes"
sshd_port: 22
sshd_x11_forwarding: "no"
sshd_allow_tcp_forwarding: "no"

# ---------------------------------------------------------------------------
# Dev tool installers
# ---------------------------------------------------------------------------
home_dev_install_nvm: true
home_dev_nvm_version: "0.40.3"
home_dev_install_rust: true

# ---------------------------------------------------------------------------
# Dotfiles
# ---------------------------------------------------------------------------
home_dotfiles_repo: "https://github.com/Zolkyed/dotfiles.git"
home_dotfiles_repo_branch: "main"
home_dotfiles_use_repo: false
# true = git clone from home_dotfiles_repo
# false = copy from local home_dotfiles_chezmoi_source
home_dotfiles_chezmoi_source: "{{ playbook_dir }}/../../chezmoi"

# ---------------------------------------------------------------------------
# Hayase
# ---------------------------------------------------------------------------
home_hayase_api_url: https://api.hayase.watch/latest
home_hayase_appimage_dest: /usr/local/bin/hayase

# ---------------------------------------------------------------------------
# Flatpaks (distro-agnostic)
# ---------------------------------------------------------------------------
home_base_flatpaks:
  - com.discordapp.Discord
  - com.brave.Browser
  - com.visualstudio.code
  - com.spotify.Client

home_gaming_flatpaks:
  - com.heroicgameslauncher.hgl
  - net.pcsx2.PCSX2
  - net.davidotek.pupgui2

# ---------------------------------------------------------------------------
# Wayland desktop packages
# ---------------------------------------------------------------------------
desktop_hyprland_packages:
  - hyprland
  - xdg-desktop-portal-hyprland
  - waybar
  - rofi
  - kitty
  - wl-clipboard
  - grim
  - slurp
  - brightnessctl
  - playerctl
  - pavucontrol
  - network-manager-applet
  - swaylock
  - swayidle
  - hyprpaper

desktop_niri_packages:
  - niri
  - xdg-desktop-portal-wlr
  - waybar
  - kitty
  - rofi
  - dunst
  - mako
  - swaylock
  - swayidle
  - wl-clipboard
  - grim
  - slurp
  - brightnessctl
  - playerctl
  - network-manager-applet
  - pavucontrol

# ---------------------------------------------------------------------------
# Nerd Fonts (downloaded from GitHub)
# ---------------------------------------------------------------------------
system_fonts_nerd:
  version: "3.4.0"
  families:
    - JetBrainsMono
    - Hack
    - FiraCode
    - NerdFontsSymbolsOnly
