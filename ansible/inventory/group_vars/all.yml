---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh
user_groups:
  - wheel
  - audio
  - video

# ---------------------------------------------------------------------------
# Presets
# ---------------------------------------------------------------------------
always_profiles:
  - core
  - shell
  - utility
  - fun
  - fonts
  - networking
  - sshd

presets:
  desktop:
    profiles:
      - audio
      - bluetooth
      - vpn
      - firewall
      - fail2ban
      - bootloader
      - snapshot
      - docker
      - virtualization
      - plasma
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - gaming
      - konsave
      - xdg

  laptop:
    profiles:
      - audio
      - bluetooth
      - vpn
      - firewall
      - fail2ban
      - bootloader
      - snapshot
      - docker
      - virtualization
      - plasma
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - konsave
      - xdg

  server:
    profiles:
      - vpn
      - firewall
      - fail2ban
      - bootloader
      - snapshot
      - docker
      - virtualization
