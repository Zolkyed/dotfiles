---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh
user_groups:
  - wheel
  - audio
  - video

# ---------------------------------------------------------------------------
# Presets
# ---------------------------------------------------------------------------
presets:
  # ---------------------------------------------------------------------------
  # DESKTOP
  # ---------------------------------------------------------------------------
  desktop:
    features:
      - audio
      - avahi
      - bluetooth
      - vpn
      - firewall
      - fail2ban
      - firmware
      - nvidia_gpu
      - bootloader
      - snapper
      - docker
      - virtualization
      - plasma
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - gaming
      - xdg
      - splashboot

  # ---------------------------------------------------------------------------
  # LAPTOP
  # ---------------------------------------------------------------------------
  laptop:
    features:
      - audio
      - avahi
      - bluetooth
      - vpn
      - firewall
      - fail2ban
      - firmware
      - amd_gpu
      - bootloader
      - snapper
      - docker
      - virtualization
      - plasma
      - browser
      - dev
      - flatpak
      - mihon
      - media
      - office
      - ai
      - rclone
      - xdg
      - splashboot

  # ---------------------------------------------------------------------------
  # SERVER
  # ---------------------------------------------------------------------------
  server:
    features:
      - vpn
      - firewall
      - fail2ban
      - bootloader
      - snapper
      - docker
      - virtualization
