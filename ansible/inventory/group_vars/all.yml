---
# Target user — ansible_user should be set in inventory if it differs from user_name
user_name: charl
user_home: "/home/{{ user_name }}"

# Flatpaks are distro-agnostic
base:
  flatpaks:
    - com.discordapp.Discord
    - com.brave.Browser

gaming:
  flatpaks:
    - com.heroicgameslauncher.hgl
    - net.davidotek.pupgui2

# Nerd fonts config is distro-agnostic (downloaded from GitHub)
fonts:
  nerd:
    version: "3.4.0"
    families:
      - JetBrainsMono
      - Hack
      - FiraCode
      - NerdFontsSymbolsOnly