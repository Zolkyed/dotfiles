---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
# Target user — ansible_user should be set in inventory if it differs from user_name
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh

# ---------------------------------------------------------------------------
# Feature flags — shared defaults; override per host in host_vars
# ---------------------------------------------------------------------------

# System
splashboot_enabled: false
docker_enabled: true
virtualization_enabled: true
vpn_enabled: true
firewall_enabled: true
fail2ban_enabled: true

# Desktop
kde_enabled: true
hyprland_enabled: false
niri_enabled: false

# Home
ai_enabled: true
gaming_enabled: false
browser_enabled: false

# ---------------------------------------------------------------------------
# Home
# ---------------------------------------------------------------------------
# Flatpak
home_shared_flatpaks:
  - com.discordapp.Discord
  - com.visualstudio.code
  - com.spotify.Client

home_gaming_flatpaks:
  - com.heroicgameslauncher.hgl
  - net.pcsx2.PCSX2
  - net.davidotek.pupgui2

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------

# SSH
system_sshd_permit_root_login: "no"
system_sshd_password_authentication: "no"
system_sshd_pubkey_authentication: "yes"
system_sshd_port: 22
system_sshd_x11_forwarding: "no"
system_sshd_allow_tcp_forwarding: "no"
