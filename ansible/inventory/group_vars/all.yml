---
# ---------------------------------------------------------------------------
# User
# ---------------------------------------------------------------------------
user_name: charl
user_home: "/home/{{ user_name }}"
user_shell: /bin/zsh

# ---------------------------------------------------------------------------
# Feature flags
# ---------------------------------------------------------------------------

# System
splashboot_enabled: false
nvidia_enabled: false
docker_enabled: true
virtualization_enabled: true
vpn_enabled: true
firewall_enabled: true
fail2ban_enabled: true

# Desktop
plasma_enabled: true
hyprland_enabled: false
niri_enabled: false

# Apps
browser_enabled: true
dev_enabled: true
flatpak_enabled: true
hayase_enabled: true
mihon_enabled: true
media_enabled: true
office_enabled: true
rclone_enabled: true
system_tools_enabled: true
vscode_enabled: true
gaming_enabled: false
konsave_enabled: false

# Home
xdg_enabled: true

# ---------------------------------------------------------------------------
# Flatpak
# ---------------------------------------------------------------------------
shared_flatpaks:
  - com.discordapp.Discord
  - com.spotify.Client

gaming_flatpaks:
  - com.heroicgameslauncher.hgl
  - net.pcsx2.PCSX2
  - net.davidotek.pupgui2

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------

# SSH
sshd_permit_root_login: "no"
sshd_password_authentication: "no"
sshd_pubkey_authentication: "yes"
sshd_port: 22
sshd_x11_forwarding: "no"
sshd_allow_tcp_forwarding: "no"
