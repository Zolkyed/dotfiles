  - docker-ce
  - docker-ce-cli
  - containerd.io

system_docker_plugin_packages:
  - docker-buildx-plugin
  - docker-compose-plugin

system_docker_group: docker

# Fonts
system_fonts_packages:
  - fonts-noto
  - fonts-noto-cjk
  - fonts-noto-color-emoji
  - fonts-dejavu
  - fonts-liberation
  - fonts-freefont-ttf

# Networking / VPN
system_networking_packages:
  - network-manager
  - systemd-resolved

system_vpn_packages:
  - wireguard-tools
  - openvpn
  - network-manager-openvpn
  - network-manager-openvpn-gnome

# Splash boot

system_splashboot_packages:
  - plymouth
  - plymouth-themes

# SSH
system_sshd_package: openssh-server
system_sshd_service: ssh

# Virtualization
system_libvirt_service: libvirtd

system_virtualization_kvm_packages:
