---
- name: "Install packages | {{ install_label }}"
  community.general.pacman:
    name: "{{ install_pacman_packages }}"
    state: present
  when: install_pacman_packages | default([]) | length > 0

- name: "Install AUR packages | {{ install_label }}"
  kewlfft.aur.aur:
    name: "{{ install_aur_packages }}"
    use: paru
    state: present
  become: true
  become_user: "{{ user_name }}"
  when: install_aur_packages | default([]) | length > 0

- name: "Install flatpak packages | {{ install_label }}"
  community.general.flatpak:
    name: "{{ install_flatpak_packages }}"
    state: present
    remote: flathub
  when: install_flatpak_packages | default([]) | length > 0

- name: "Install pipx packages | {{ install_label }}"
  community.general.pipx:
    name: "{{ item }}"
    state: present
    executable: /usr/bin/pipx
  become: true
  become_user: "{{ user_name }}"
  loop: "{{ install_pipx_packages | default([]) }}"
  when: install_pipx_packages | default([]) | length > 0

- name: "Install npm global packages | {{ install_label }}"
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
  become: true
  become_user: "{{ user_name }}"
  loop: "{{ install_npm_packages | default([]) }}"
  when: install_npm_packages | default([]) | length > 0
