---
- name: Detect | Collect PCI devices
  ansible.builtin.command:
    cmd: lspci -nn
  register: detect_lspci
  changed_when: false
  check_mode: false

- name: Detect | Build hardware features
  ansible.builtin.set_fact:
    auto_detected_features: >-
      {{
        (['nvidia_gpu']  if detect_lspci.stdout is search('NVIDIA.*(VGA|3D|Display)') else [])
        + (['amd_gpu']   if detect_lspci.stdout is search('AMD|ATI.*(VGA|3D|Display)') else [])
        + (['intel_gpu'] if detect_lspci.stdout is search('Intel.*(Graphics|Display|HD Graphics)') else [])
      }}
