---
- name: Install pipx
  ansible.builtin.package:
    name: pipx
    state: present

- name: Install konsave via pipx
  community.general.pipx:
    name: konsave
    state: present
  become: false
  become_user: "{{ user_name }}"

- name: Import konsave profile
  ansible.builtin.command:
    cmd: "konsave -i {{ konsave_profiles_dir }}/{{ konsave_profile_name }}.knsv"
  become: false
  become_user: "{{ user_name }}"
  register: konsave_import
  failed_when: konsave_import.rc != 0
  changed_when: konsave_import.rc == 0
  ignore_errors: true
