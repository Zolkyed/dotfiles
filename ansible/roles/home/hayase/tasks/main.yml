---
- name: Check if Hayase is already installed
  ansible.builtin.command:
    cmd: dpkg-query -W -f='${Status}' hayase
  register: hayase_pkg_check
  changed_when: false
  failed_when: false
  when: ansible_os_family == "Debian"

- name: Check if Hayase AppImage exists
  ansible.builtin.stat:
    path: "{{ hayase_appimage_dest }}"
  register: hayase_appimage_stat
  when: ansible_os_family == "Archlinux"

- name: Get Hayase latest release info
  ansible.builtin.uri:
    url: "{{ hayase_api_url }}"
    return_content: true
  register: hayase_release
  when: >
    (ansible_os_family == "Debian" and
     hayase_pkg_check.stdout | default('') != 'install ok installed')
    or
    (ansible_os_family == "Archlinux" and
     not (hayase_appimage_stat.stat.exists | default(false)))

- name: Install Hayase from .deb (Debian/Ubuntu)
  ansible.builtin.apt:
    deb: "{{ hayase_release.json | dict2items | selectattr('key', 'match', 'linux-hayase-.*[.]deb') | map(attribute='value') | first }}"
    state: present
  when:
    - ansible_os_family == "Debian"
    - hayase_pkg_check.stdout | default('') != 'install ok installed'

- name: Install Hayase AppImage (Arch)
  ansible.builtin.get_url:
    url: "{{ hayase_release.json | dict2items | selectattr('key', 'match', 'linux-hayase-.*[.]AppImage') | map(attribute='value') | first }}"
    dest: "{{ hayase_appimage_dest }}"
    mode: "0755"
  when:
    - ansible_os_family == "Archlinux"
    - not (hayase_appimage_stat.stat.exists | default(false))
