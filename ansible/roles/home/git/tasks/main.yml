---
- name: Install git
  ansible.builtin.package:
    name: git
    state: present

- name: Check git config source files exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ git_config_files }}"
  register: git_config_stats
  become: false
  become_user: "{{ user_name }}"

- name: Fail if git config source files are missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >-
      Missing git config file: {{ item.item }}.
      Ensure home/dotfiles has applied chezmoi successfully before home/git runs.
  loop: "{{ git_config_stats.results }}"
