---
- name: Check if opencode is installed
  ansible.builtin.command: which opencode
  register: home_ai_opencode_check
  failed_when: false
  changed_when: false
  become: true
  become_user: "{{ user_name }}"

- name: Download opencode installer
  ansible.builtin.get_url:
    url: https://opencode.ai/install
    dest: /tmp/opencode-install.sh
    mode: "0755"
  when: home_ai_opencode_check.rc != 0
  become: true
  become_user: "{{ user_name }}"

- name: Install opencode
  ansible.builtin.command:
    cmd: bash /tmp/opencode-install.sh
  when: home_ai_opencode_check.rc != 0
  become: true
  become_user: "{{ user_name }}"
