---
- name: Browser | Check paru availability for AUR package
  ansible.builtin.command:
    cmd: which paru
  register: home_browser_paru_check
  changed_when: false
  failed_when: false
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - home_browser_package | length > 0

- name: Browser | Assert paru is available for AUR package
  ansible.builtin.assert:
    that:
      - home_browser_paru_check.rc == 0
    fail_msg: "Browser AUR package requires paru. Run the aur tag before browser."
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - home_browser_package | length > 0

- name: Browser | Assert Arch Linux for AUR browser package
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Archlinux"
    fail_msg: "home/browser currently installs the browser from AUR and only supports Arch Linux."
  when: home_browser_package | length > 0

- name: Browser | Check installed AUR package
  ansible.builtin.command:
    cmd: "pacman -Q {{ home_browser_package }}"
  register: home_browser_aur_package_check
  changed_when: false
  failed_when: false
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - home_browser_package | length > 0

- name: Browser | Install AUR package
  ansible.builtin.command:
    argv: ["paru", "-S", "--needed", "--noconfirm", "{{ home_browser_package }}"]
  become: true
  become_user: "{{ user_name }}"
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - home_browser_package | length > 0
    - home_browser_aur_package_check.rc != 0

- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ home_browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ home_browser_policy_dir }}/{{ home_browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
