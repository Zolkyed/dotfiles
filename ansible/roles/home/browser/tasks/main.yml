---
- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ home_browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ home_browser_policy_dir }}/{{ home_browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
