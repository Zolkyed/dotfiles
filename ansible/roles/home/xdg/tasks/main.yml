- name: XDG | Configure xdg-terminal-exec preference
  ansible.builtin.copy:
    content: "{{ xdg_terminal_desktop }}\n"
    dest: "{{ user_home }}/.config/xdg-terminals.list"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: XDG | Locate KDE config writer
  ansible.builtin.command:
    cmd: sh -c 'command -v kwriteconfig6 || command -v kwriteconfig5'
  register: xdg_kwriteconfig_check
  changed_when: false
  failed_when: false

- name: XDG | Set KDE default terminal
  ansible.builtin.command:
    argv:
      - "{{ xdg_kwriteconfig_check.stdout }}"
      - --file
      - kdeglobals
      - --group
      - General
      - --key
      - TerminalApplication
      - "{{ xdg_terminal_command }}"
  become: true
  become_user: "{{ user_name }}"
  changed_when: true
  when: xdg_kwriteconfig_check.rc == 0
