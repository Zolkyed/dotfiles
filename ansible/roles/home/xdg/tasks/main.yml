---
- name: XDG | Ensure user config directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: XDG | Check default browser application
  ansible.builtin.command:
    argv:
      - xdg-settings
      - get
      - default-web-browser
  become: false
  register: xdg_default_browser_check
  changed_when: false
  failed_when: false

- name: XDG | Set default browser application
  ansible.builtin.command:
    argv:
      - xdg-settings
      - set
      - default-web-browser
      - "{{ xdg_browser_desktop }}"
  become: false
  changed_when: true
  failed_when: false
  when: xdg_default_browser_check.stdout != xdg_browser_desktop

- name: XDG | Check default browser mime types
  ansible.builtin.command:
    argv:
      - xdg-mime
      - query
      - default
      - "{{ item }}"
  become: false
  register: xdg_browser_mime_checks
  changed_when: false
  failed_when: false
  loop: "{{ xdg_browser_mime_types }}"

- name: XDG | Set default browser mime types
  ansible.builtin.command:
    argv:
      - xdg-mime
      - default
      - "{{ xdg_browser_desktop }}"
      - "{{ item.item }}"
  become: false
  changed_when: true
  loop: "{{ xdg_browser_mime_checks.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stdout != xdg_browser_desktop

