---
- name: Pacman | Configure options
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    insertafter: ^\[options\]
    owner: root
    group: root
    mode: "0644"
  loop:
    - regexp: '^#?\s*ParallelDownloads\s*='
      line: ParallelDownloads = 5
    - regexp: '^#?Color$'
      line: Color
    - regexp: '^#?ILoveCandy$'
      line: ILoveCandy
    - regexp: '^#?VerbosePkgLists$'
      line: VerbosePkgLists
  loop_control:
    label: "{{ item.line }}"
  notify: Pacman | Update pacman cache

- name: Pacman | Configure multilib repository
  ansible.builtin.blockinfile:
    path: /etc/pacman.conf
    marker: "# {mark} ANSIBLE MANAGED MULTILIB"
    block: |
      [multilib]
      Include = /etc/pacman.d/mirrorlist
    state: "{{ 'present' if pacman_enable_multilib else 'absent' }}"
    owner: root
    group: root
    mode: "0644"
  notify: Pacman | Update pacman cache

- name: Pacman | Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Pacman | Update Arch Linux keyring
  community.general.pacman:
    name: archlinux-keyring
    state: latest
    update_cache: true

- name: Pacman | Ensure hooks directory exists
  ansible.builtin.file:
    path: /etc/pacman.d/hooks
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Pacman | Deploy paccache cleanup hook
  ansible.builtin.copy:
    dest: /etc/pacman.d/hooks/paccache.hook
    owner: root
    group: root
    mode: "0644"
    content: |
      [Trigger]
      Operation = Upgrade
      Operation = Install
      Operation = Remove
      Type = Package
      Target = *

      [Action]
      Description = Cleaning pacman cache (keeping last 2 versions)...
      When = PostTransaction
      Exec = /usr/bin/paccache -rk2
