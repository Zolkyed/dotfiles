---
- name: Bluetooth | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Bluetooth
    install_pacman_packages: "{{ bluetooth_pacman_packages }}"

- name: Bluetooth | Auto-enable adapters
  community.general.ini_file:
    path: /etc/bluetooth/main.conf
    section: Policy
    option: AutoEnable
    value: "true"
    state: present
    owner: root
    group: root
    mode: "0644"
  notify: Bluetooth | Restart bluetooth

- name: Bluetooth | Enable and start bluetooth service
  ansible.builtin.systemd_service:
    name: bluetooth.service
    enabled: true
    state: started
