---
- name: Package cache | Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts["os_family"] == "Debian"

- name: Package cache | Update pacman cache
  community.general.pacman:
    update_cache: true
  when: ansible_facts["os_family"] == "Archlinux"
