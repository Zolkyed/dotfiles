---
- name: Audio | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Audio
    install_pacman_packages: "{{ audio_pacman_packages }}"

- name: Audio | Enable and start realtime scheduling service
  ansible.builtin.systemd_service:
    name: rtkit-daemon
    enabled: true
    state: started

- name: Audio | Enable PipeWire socket globally
  ansible.builtin.systemd_service:
    name: pipewire.socket
    enabled: true
    scope: global

- name: Audio | Enable PipeWire Pulse socket globally
  ansible.builtin.systemd_service:
    name: pipewire-pulse.socket
    enabled: true
    scope: global

- name: Audio | Enable WirePlumber service globally
  ansible.builtin.systemd_service:
    name: wireplumber.service
    enabled: true
    scope: global
