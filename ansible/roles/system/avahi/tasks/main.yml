---
- name: Avahi | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Avahi
    install_pacman_packages: "{{ avahi_pacman_packages }}"

- name: Avahi | Ensure mDNS is in hosts resolution
  ansible.builtin.lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^hosts:'
    line: 'hosts: files mdns_minimal [NOTFOUND=return] myhostname resolve [!UNAVAIL=return] dns'
    backup: true

- name: Avahi | Enable and start avahi-daemon
  ansible.builtin.systemd_service:
    name: avahi-daemon
    enabled: true
    state: started
