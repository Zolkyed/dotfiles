---
- name: Mirrors | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Mirrors
    install_pacman_packages: "{{ mirrors_pacman_packages }}"

- name: Mirrors | Configure reflector
  ansible.builtin.template:
    src: reflector.conf.j2
    dest: /etc/xdg/reflector/reflector.conf
    owner: root
    group: root
    mode: "0644"
  notify: Mirrors | Refresh mirrorlist

- name: Mirrors | Enable reflector timer
  ansible.builtin.systemd_service:
    name: reflector.timer
    enabled: true
    state: started
