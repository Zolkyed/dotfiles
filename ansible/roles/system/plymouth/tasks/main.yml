---
- name: Plymouth | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Plymouth
    install_pacman_packages: "{{ plymouth_pacman_packages }}"
    install_aur_packages: "{{ plymouth_aur_packages | default([]) }}"

- name: Plymouth | Check available Plymouth themes
  ansible.builtin.command:
    cmd: plymouth-set-default-theme --list
  register: plymouth_themes
  changed_when: false
  failed_when: false

- name: Plymouth | Check current Plymouth theme
  ansible.builtin.command:
    cmd: plymouth-set-default-theme
  register: plymouth_current_theme
  changed_when: false
  failed_when: false

- name: Plymouth | Set Plymouth theme
  ansible.builtin.command:
    cmd: "plymouth-set-default-theme {{ plymouth_theme }}"
  changed_when: true
  notify: Plymouth | Rebuild initramfs
  when:
    - plymouth_themes.rc == 0
    - plymouth_theme in plymouth_themes.stdout_lines
    - plymouth_current_theme.stdout != plymouth_theme

- name: Plymouth | Configure mkinitcpio hooks
  ansible.builtin.copy:
    dest: /etc/mkinitcpio.conf.d/10-hooks.conf
    content: "HOOKS=({{ plymouth_mkinitcpio_hooks | join(' ') }})\n"
    owner: root
    group: root
    mode: "0644"
  notify: Plymouth | Rebuild initramfs

- name: Plymouth | Merge GRUB splash options
  ansible.builtin.set_fact:
    system_grub_cmdline_linux_default: >-
      {{
        (
          (system_grub_cmdline_linux_default | default('')).split()
          + (plymouth_grub_options | default([]))
        )
        | unique
        | join(' ')
      }}
