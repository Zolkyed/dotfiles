---
plymouth_pacman_packages:
  - plymouth

plymouth_aur_packages:
  - plymouth-theme-arch-breeze-git

plymouth_theme: arch-breeze
plymouth_grub_options:
  - quiet
  - splash

plymouth_mkinitcpio_hooks:
  - base
  - udev
  - autodetect
  - microcode
  - modconf
  - kms
  - keyboard
  - keymap
  - consolefont
  - plymouth
  - block
  - filesystems
  - fsck
