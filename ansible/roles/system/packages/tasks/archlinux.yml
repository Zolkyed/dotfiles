---
- name: Packages | Install packages
  community.general.pacman:
    name: "{{
      core_packages +
      utility_packages +
      fun_packages +
      (office_enabled | ternary(office_packages | default([]), [])) +
      (system_tools_enabled | ternary(system_tools_packages | default([]), []))
    }}"
    state: present

- name: Packages | Install AUR packages
  kewlfft.aur.aur:
    name: "{{ aur_packages }}"
    use: makepkg
    state: present
  become: true
  become_user: "{{ user_name }}"
  when: aur_packages | length > 0
