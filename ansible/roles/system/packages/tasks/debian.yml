---
- name: Packages | Install always-on packages
  ansible.builtin.apt:
    update_cache: true
    name: "{{ (profiles.core.apt | default([])) +
      (profiles.shell.apt | default([])) +
      (profiles.utility.apt | default([])) +
      (profiles.fun.apt | default([])) +
      (profiles.fonts.apt | default([])) +
      (profiles.networking.apt | default([])) +
      (profiles.sshd.apt | default([]))
    }}"
    state: present

- name: Packages | Install conditional packages
  ansible.builtin.apt:
    name: "{{
      (audio_enabled | ternary((profiles.audio.apt | default([])), [])) +
      (bluetooth_enabled | ternary((profiles.bluetooth.apt | default([])), [])) +
      (vpn_enabled | ternary((profiles.vpn.apt | default([])), [])) +
      (firewall_enabled | ternary((profiles.firewall.apt | default([])), [])) +
      (fail2ban_enabled | ternary((profiles.fail2ban.apt | default([])), [])) +
      (nvidia_enabled | ternary((profiles.nvidia.apt | default([])), [])) +
      (bootloader_enabled | ternary((profiles.bootloader.apt | default([])), [])) +
      (splashboot_enabled | ternary((profiles.splashboot.apt | default([])), [])) +
      (system_tools_enabled | ternary((profiles.system_tools.apt | default([])), [])) +
      (docker_enabled | ternary((profiles.docker.apt | default([])), [])) +
      (virtualization_enabled | ternary((profiles.virtualization_kvm.apt | default([])) + (profiles.virtualization_virtualbox.apt | default([])), [])) +
      (plasma_enabled | ternary((profiles.plasma.apt | default([])), [])) +
      (hyprland_enabled | ternary((profiles.hyprland.apt | default([])), [])) +
      (niri_enabled | ternary((profiles.niri.apt | default([])), [])) +
      (dev_enabled | ternary((profiles.dev.apt | default([])), [])) +
      (media_enabled | ternary((profiles.media.apt | default([])), [])) +
      (gaming_enabled | ternary((profiles.gaming.apt | default([])), [])) +
      (office_enabled | ternary((profiles.office.apt | default([])), [])) +
      (flatpak_enabled | ternary((profiles.flatpak.apt | default([])), [])) +
      (rclone_enabled | ternary((profiles.rclone.apt | default([])), []))
    }}"
    state: present
