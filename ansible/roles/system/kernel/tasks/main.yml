---
- name: Kernel | Install zen kernel
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Kernel
    install_pacman_packages: "{{ kernel_pacman_packages }}"
  when: "'zen_kernel' in enabled_features"

- name: Kernel | Enable systemd-oomd
  ansible.builtin.systemd_service:
    name: systemd-oomd
    enabled: true
    state: started

- name: Kernel | Apply kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: "{{ kernel_sysctl_file }}"
    state: present
    sysctl_set: true
    reload: true
  loop: "{{ kernel_sysctl_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: kernel_sysctl_settings | length > 0

- name: Kernel | Deploy I/O scheduler udev rules
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/60-io-scheduler.rules
    owner: root
    group: root
    mode: "0644"
    content: |
      ACTION=="add|change", KERNEL=="nvme[0-9]*n[0-9]*", ATTR{queue/scheduler}="none"
      ACTION=="add|change", KERNEL=="sd[a-z]", ATTR{queue/rotational}=="1", ATTR{queue/scheduler}="bfq"
      ACTION=="add|change", KERNEL=="sd[a-z]|mmcblk[0-9]*", ATTR{queue/rotational}=="0", ATTR{queue/scheduler}="mq-deadline"
  notify: Kernel | Reload udev rules
