---
- name: Fail2ban | Install packages
  ansible.builtin.package:
    name: "{{ system_fail2ban_packages }}"
    state: present

- name: Fail2ban | Deploy jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Fail2ban | Enable and start service
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
