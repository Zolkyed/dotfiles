---
- name: Fail2ban | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Fail2ban
    install_pacman_packages: "{{ fail2ban_pacman_packages }}"

- name: Fail2ban | Deploy jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Fail2ban | Restart fail2ban

- name: Fail2ban | Enable and start service
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started
