---
- name: SSHD | Validate vaulted ssh host key pair when partially set
  ansible.builtin.assert:
    that:
      - sshd_host_ed25519_private_key != ''
      - sshd_host_ed25519_public_key != ''
    fail_msg: "SSH host key vault vars must either both be set or both be empty."
  when: sshd_host_ed25519_private_key != '' or sshd_host_ed25519_public_key != ''

- name: SSHD | Deploy vaulted ssh host private key
  ansible.builtin.copy:
    content: "{{ sshd_host_ed25519_private_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key
    owner: root
    group: root
    mode: "0600"
  when: sshd_host_ed25519_private_key != ''
  no_log: true
  notify: SSHD | Restart sshd

- name: SSHD | Deploy vaulted ssh host public key
  ansible.builtin.copy:
    content: "{{ sshd_host_ed25519_public_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root
    group: root
    mode: "0644"
  when: sshd_host_ed25519_public_key != ''
  notify: SSHD | Restart sshd

- name: SSHD | Generate ssh host keys when not vaulted
  ansible.builtin.command:
    cmd: ssh-keygen -A
    creates: /etc/ssh/ssh_host_ed25519_key
  when:
    - sshd_host_ed25519_private_key == ''
    - sshd_host_ed25519_public_key == ''

- name: SSHD | Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: SSHD | Harden sshd configuration
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardened.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin {{ sshd_permit_root_login }}
      PasswordAuthentication {{ sshd_password_authentication }}
      PubkeyAuthentication {{ sshd_pubkey_authentication }}
      Port {{ sshd_port }}
      X11Forwarding {{ sshd_x11_forwarding }}
      AllowTcpForwarding {{ sshd_allow_tcp_forwarding }}
  notify: SSHD | Restart sshd

- name: SSHD | Validate sshd configuration
  ansible.builtin.command:
    cmd: sshd -t
  changed_when: false

- name: SSHD | Enable and start service
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
