---
- name: SSHD | Run Debian tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts["os_family"] | lower == "debian"

- name: SSHD | Run Arch Linux tasks
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_facts["os_family"] | lower == "archlinux"

- name: Validate vaulted ssh host key pair when partially set
  ansible.builtin.assert:
    that:
      - system_sshd_host_ed25519_private_key != ''
      - system_sshd_host_ed25519_public_key != ''
    fail_msg: "SSH host key vault vars must either both be set or both be empty."
  when: system_sshd_host_ed25519_private_key != '' or system_sshd_host_ed25519_public_key != ''

- name: Deploy vaulted ssh host private key
  ansible.builtin.copy:
    content: "{{ system_sshd_host_ed25519_private_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key
    owner: root
    group: root
    mode: "0600"
  when: system_sshd_host_ed25519_private_key != ''
  no_log: true
  notify: Restart sshd

- name: Deploy vaulted ssh host public key
  ansible.builtin.copy:
    content: "{{ system_sshd_host_ed25519_public_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root
    group: root
    mode: "0644"
  when: system_sshd_host_ed25519_public_key != ''
  notify: Restart sshd

- name: Generate ssh host keys when not vaulted
  ansible.builtin.command:
    cmd: ssh-keygen -A
    creates: /etc/ssh/ssh_host_ed25519_key
  when:
    - system_sshd_host_ed25519_private_key == ''
    - system_sshd_host_ed25519_public_key == ''

- name: Harden sshd configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: sshd -t -f %s
  loop:
    - regexp: '^#?PermitRootLogin'
      line: "PermitRootLogin {{ system_sshd_permit_root_login }}"
    - regexp: '^#?PasswordAuthentication'
      line: "PasswordAuthentication {{ system_sshd_password_authentication }}"
    - regexp: '^#?PubkeyAuthentication'
      line: "PubkeyAuthentication {{ system_sshd_pubkey_authentication }}"
    - regexp: '^#?Port '
      line: "Port {{ system_sshd_port }}"
    - regexp: '^#?X11Forwarding'
      line: "X11Forwarding {{ system_sshd_x11_forwarding }}"
    - regexp: '^#?AllowTcpForwarding'
      line: "AllowTcpForwarding {{ system_sshd_allow_tcp_forwarding }}"
  notify: Restart sshd

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: "{{ system_sshd_service }}"
    enabled: true
    state: started
