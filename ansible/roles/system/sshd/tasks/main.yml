---
- name: "SSHD | Run {{ ansible_facts.os_family }} tasks"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: SSHD | Validate vaulted ssh host key pair when partially set
  ansible.builtin.assert:
    that:
      - sshd_host_ed25519_private_key != ''
      - sshd_host_ed25519_public_key != ''
    fail_msg: "SSH host key vault vars must either both be set or both be empty."
  when: sshd_host_ed25519_private_key != '' or sshd_host_ed25519_public_key != ''

- name: SSHD | Deploy vaulted ssh host private key
  ansible.builtin.copy:
    content: "{{ sshd_host_ed25519_private_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key
    owner: root
    group: root
    mode: "0600"
  when: sshd_host_ed25519_private_key != ''
  no_log: true
  notify: SSHD | Restart sshd

- name: SSHD | Deploy vaulted ssh host public key
  ansible.builtin.copy:
    content: "{{ sshd_host_ed25519_public_key }}"
    dest: /etc/ssh/ssh_host_ed25519_key.pub
    owner: root
    group: root
    mode: "0644"
  when: sshd_host_ed25519_public_key != ''
  notify: SSHD | Restart sshd

- name: SSHD | Generate ssh host keys when not vaulted
  ansible.builtin.command:
    cmd: ssh-keygen -A
    creates: /etc/ssh/ssh_host_ed25519_key
  when:
    - sshd_host_ed25519_private_key == ''
    - sshd_host_ed25519_public_key == ''

- name: SSHD | Harden sshd configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: sshd -t -f %s
  loop:
    - regexp: '^#?PermitRootLogin'
      line: "PermitRootLogin {{ sshd_permit_root_login }}"
    - regexp: '^#?PasswordAuthentication'
      line: "PasswordAuthentication {{ sshd_password_authentication }}"
    - regexp: '^#?PubkeyAuthentication'
      line: "PubkeyAuthentication {{ sshd_pubkey_authentication }}"
    - regexp: '^#?Port '
      line: "Port {{ sshd_port }}"
    - regexp: '^#?X11Forwarding'
      line: "X11Forwarding {{ sshd_x11_forwarding }}"
    - regexp: '^#?AllowTcpForwarding'
      line: "AllowTcpForwarding {{ sshd_allow_tcp_forwarding }}"
  notify: SSHD | Restart sshd

- name: SSHD | Enable and start sshd
  ansible.builtin.systemd:
    name: "{{ sshd_service }}"
    enabled: true
    state: started
