---
- name: Install openssh
  ansible.builtin.package:
    name: "{{ system_sshd_package }}"
    state: present

- name: Harden sshd configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: sshd -t -f %s
  loop:
    - regexp: '^#?PermitRootLogin'
      line: "PermitRootLogin {{ system_sshd_permit_root_login }}"
    - regexp: '^#?PasswordAuthentication'
      line: "PasswordAuthentication {{ system_sshd_password_authentication }}"
    - regexp: '^#?PubkeyAuthentication'
      line: "PubkeyAuthentication {{ system_sshd_pubkey_authentication }}"
    - regexp: '^#?Port '
      line: "Port {{ system_sshd_port }}"
    - regexp: '^#?X11Forwarding'
      line: "X11Forwarding {{ system_sshd_x11_forwarding }}"
    - regexp: '^#?AllowTcpForwarding'
      line: "AllowTcpForwarding {{ system_sshd_allow_tcp_forwarding }}"
  notify: Restart sshd

- name: Enable and start sshd
  ansible.builtin.systemd:
    name: "{{ system_sshd_service }}"
    enabled: true
    state: started
