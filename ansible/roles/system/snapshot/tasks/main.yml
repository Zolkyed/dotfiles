---
- name: Snapshot | Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true
  become: true

- name: Snapshot | Remove stale /home/.snapshots if needed
  ansible.builtin.command:
    cmd: btrfs subvolume delete /home/.snapshots
    creates: /etc/snapper/configs/home
  failed_when: false
  become: true

- name: Snapshot | Create snapper configs
  ansible.builtin.command:
    cmd: "snapper -c {{ item.config }} create-config {{ item.path }}"
    creates: "/etc/snapper/configs/{{ item.config }}"
  loop: "{{ snapper_subvolumes }}"
  become: true

- name: Snapshot | Ensure .snapshots directories exist
  ansible.builtin.file:
    path: "{{ item.path }}/.snapshots"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ snapper_subvolumes }}"
  become: true

- name: Snapshot | Configure snapper retention
  ansible.builtin.lineinfile:
    path: "/etc/snapper/configs/{{ item[0].config }}"
    regexp: "^{{ item[1].key }}"
    line: "{{ item[1].key }}={{ item[1].value }}"
  loop: "{{ snapper_subvolumes | product(snapper_retention_settings) }}"
  become: true
  vars:
    snapper_retention_settings:
      - key: TIMELINE_LIMIT_HOURLY
        value: "{{ snapshot_timeline_limit.hourly }}"
      - key: TIMELINE_LIMIT_DAILY
        value: "{{ snapshot_timeline_limit.daily }}"
      - key: TIMELINE_LIMIT_WEEKLY
        value: "{{ snapshot_timeline_limit.weekly }}"
      - key: TIMELINE_LIMIT_MONTHLY
        value: "{{ snapshot_timeline_limit.monthly }}"
      - key: CLEANUP_ALGORITHM
        value: "{{ snapshot_cleanup_algorithm }}"

- name: Snapshot | Enable and start grub-btrfsd
  ansible.builtin.systemd_service:
    name: grub-btrfsd
    enabled: true
    state: started
  become: true

- name: Snapshot | Enable and start snapper timers
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - snapper-timeline.timer
    - snapper-cleanup.timer
  become: true
