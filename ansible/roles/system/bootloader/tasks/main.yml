---
- name: Detect UEFI firmware
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: efi_dir

- name: Fail if grub_disk is not defined (BIOS)
  ansible.builtin.fail:
    msg: "grub_disk must be set in host_vars for BIOS systems"
  when:
    - not efi_dir.stat.exists
    - grub_disk is not defined

- name: Install GRUB packages
  ansible.builtin.package:
    name: "{{ efi_dir.stat.exists | ternary(grub_packages_uefi, grub_packages_bios) }}"
    state: present

- name: Deploy GRUB configuration
  ansible.builtin.template:
    src: grub.j2
    dest: /etc/default/grub
    owner: root
    group: root
    mode: "0644"
  notify: Update grub

- name: Run grub-install (BIOS)
  ansible.builtin.command:
    cmd: grub-install {{ grub_disk }}
    creates: /boot/grub/grub.cfg
  when: not efi_dir.stat.exists

- name: Run grub-install (UEFI)
  ansible.builtin.command:
    cmd: >-
      grub-install
      --target={{ grub_efi_target }}
      --efi-directory={{ grub_efi_directory }}
      --bootloader-id={{ grub_bootloader_id }}
    creates: "{{ grub_efi_directory }}/EFI/{{ grub_bootloader_id }}/grubx64.efi"
  when: efi_dir.stat.exists
