---
- name: Bootloader | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Bootloader
    install_pacman_packages: "{{ bootloader_pacman_packages }}"
    install_aur_packages: "{{ bootloader_aur_packages }}"

- name: Bootloader | Ensure /boot/grub exists
  ansible.builtin.file:
    path: /boot/grub
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Bootloader | Install GRUB to EFI
  ansible.builtin.command:
    cmd: grub-install --target=x86_64-efi --efi-directory=/boot --bootloader-id=GRUB --recheck
    creates: /boot/grub/x86_64-efi/core.efi
  notify: Bootloader | Update grub

- name: Bootloader | Configure GRUB
  ansible.builtin.template:
    src: grub.default.j2
    dest: /etc/default/grub
    owner: root
    group: root
    mode: "0644"
  notify: Bootloader | Update grub
