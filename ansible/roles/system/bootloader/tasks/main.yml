---
- name: Detect UEFI firmware
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: efi_dir

- name: Install GRUB packages (BIOS)
  ansible.builtin.package:
    name: "{{ grub_packages_bios }}"
    state: present
  when: not efi_dir.stat.exists

- name: Install GRUB packages (UEFI)
  ansible.builtin.package:
    name: "{{ grub_packages_uefi }}"
    state: present
  when: efi_dir.stat.exists

- name: Deploy GRUB configuration
  ansible.builtin.template:
    src: grub.j2
    dest: /etc/default/grub
    owner: root
    group: root
    mode: "0644"
  notify: Update grub

- name: Run grub-install (BIOS)
  ansible.builtin.command:
    cmd: grub-install {{ grub_disk }}
  changed_when: false
  when: not efi_dir.stat.exists

- name: Run grub-install (UEFI)
  ansible.builtin.command:
    cmd: grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id={{ grub_bootloader_id }}
    creates: /boot/efi/EFI/{{ grub_bootloader_id }}/grubx64.efi
  when: efi_dir.stat.exists
