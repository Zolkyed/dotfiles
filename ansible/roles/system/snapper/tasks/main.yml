---
- name: Snapper | Install packages
  ansible.builtin.package:
    name: "{{ system_snapper_packages }}"
    state: present
  when:
    - system_snapper_manage_packages
    - system_snapper_packages | length > 0

- name: Snapper | Check existing configs
  ansible.builtin.stat:
    path: "/etc/snapper/configs/{{ item.name }}"
  loop: "{{ system_snapper_configs }}"
  loop_control:
    label: "{{ item.name }}"
  register: system_snapper_config_stats

- name: Snapper | Create configs
  ansible.builtin.command:
    cmd: "snapper -c {{ item.item.name }} create-config {{ item.item.filesystem_root }}"
  loop: "{{ system_snapper_config_stats.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: not item.stat.exists
  changed_when: true

- name: Snapper | Deploy config files
  ansible.builtin.template:
    src: snapper-config.j2
    dest: "/etc/snapper/configs/{{ item.name }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ system_snapper_configs }}"
  loop_control:
    label: "{{ item.name }}"

- name: Snapper | Configure timeline timer
  ansible.builtin.systemd:
    name: "{{ system_snapper_timeline_timer }}"
    enabled: "{{ system_snapper_enable_timeline_timer }}"
    state: "{{ 'started' if system_snapper_enable_timeline_timer else 'stopped' }}"

- name: Snapper | Configure cleanup timer
  ansible.builtin.systemd:
    name: "{{ system_snapper_cleanup_timer }}"
    enabled: "{{ system_snapper_enable_cleanup_timer }}"
    state: "{{ 'started' if system_snapper_enable_cleanup_timer else 'stopped' }}"
