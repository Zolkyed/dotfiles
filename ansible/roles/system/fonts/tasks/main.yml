---
- name: Fonts | Enable LCD filter
  ansible.builtin.file:
    src: /usr/share/fontconfig/conf.avail/11-lcdfilter-default.conf
    dest: /etc/fonts/conf.d/11-lcdfilter-default.conf
    state: link

- name: Fonts | Enable sub-pixel rendering
  ansible.builtin.file:
    src: /usr/share/fontconfig/conf.avail/10-sub-pixel-rgb.conf
    dest: /etc/fonts/conf.d/10-sub-pixel-rgb.conf
    state: link

- name: Fonts | Enable hinting
  ansible.builtin.file:
    src: /usr/share/fontconfig/conf.avail/10-hinting-slight.conf
    dest: /etc/fonts/conf.d/10-hinting-slight.conf
    state: link

- name: Fonts | Create Nerd Fonts install directory
  ansible.builtin.file:
    path: "{{ fonts_nerd_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Fonts | Check installed Nerd Fonts version
  ansible.builtin.slurp:
    src: "{{ fonts_nerd_install_dir }}/.version"
  register: fonts_nerd_installed_version
  failed_when: false

- name: Fonts | Download Nerd Fonts archives
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ fonts_nerd.version }}/{{ item }}.tar.xz"
    dest: "/tmp/{{ item }}.tar.xz"
    mode: "0644"
  loop: "{{ fonts_nerd.families }}"
  register: fonts_nerd_download
  when:
    - fonts_nerd.version | length > 0
    - (fonts_nerd_installed_version.content | default('') | b64decode | trim) != fonts_nerd.version
  notify: Fonts | Extract Nerd Fonts
