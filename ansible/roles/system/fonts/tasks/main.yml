---
- name: Install system font packages
  ansible.builtin.package:
    name: "{{ system_font_packages }}"
    state: present

- name: Create Nerd Fonts install directory
  ansible.builtin.file:
    path: "{{ nerd_fonts_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Nerd Fonts archives
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v{{ nerd_fonts_version }}/{{ item }}.tar.xz"
    dest: "/tmp/{{ item }}.tar.xz"
    mode: "0644"
  loop: "{{ nerd_fonts_install }}"
  register: nerd_fonts_download

- name: Extract Nerd Fonts
  ansible.builtin.unarchive:
    src: "/tmp/{{ item.item }}.tar.xz"
    dest: "{{ nerd_fonts_install_dir }}"
    remote_src: true
  loop: "{{ nerd_fonts_download.results }}"
  when: item.changed

- name: Update font cache
  ansible.builtin.command:
    cmd: fc-cache -fv
  changed_when: true
