---
- name: Firmware | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Firmware
    install_pacman_packages: "{{ firmware_pacman_packages }}"

- name: Firmware | Enable fwupd refresh timer
  ansible.builtin.systemd_service:
    name: fwupd-refresh.timer
    enabled: true
    state: started
