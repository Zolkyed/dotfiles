---
- name: AMD GPU | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: AMD GPU
    install_pacman_packages: "{{ amd_gpu_pacman_packages }}"

- name: AMD GPU | Configure mkinitcpio modules
  ansible.builtin.copy:
    dest: /etc/mkinitcpio.conf.d/amdgpu.conf
    content: "MODULES+=({{ amd_gpu_mkinitcpio_modules | join(' ') }})\n"
    owner: root
    group: root
    mode: "0644"
  notify: AMD GPU | Rebuild initramfs
