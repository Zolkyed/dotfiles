---
- name: Install KVM packages
  ansible.builtin.package:
    name: "{{ kvm_packages }}"
    state: present
  when: vm_backend == "kvm"

- name: Install VirtualBox packages
  ansible.builtin.package:
    name: "{{ virtualbox_packages }}"
    state: present
  when: vm_backend == "virtualbox"

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started
  when: vm_backend == "kvm"

# group membership (libvirt, kvm, vboxusers) is handled by the user role
