# tasks/main.yml
---
- name: Install and configure Docker
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: Install Docker dependencies
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Add Docker apt repository with GPG key
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
        suites: "{{ ansible_facts['distribution_release'] }}"
        components: stable
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
        signed_by: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        state: present
      notify: Restart docker

- name: Install Docker packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  notify: Restart docker

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: docker
    append: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started