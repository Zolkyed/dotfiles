---
- name: Docker | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Docker
    install_pacman_packages: "{{ docker_pacman_packages }}"

- name: Docker | Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups:
      - docker
    append: true

- name: Docker | Enable and start service
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started
