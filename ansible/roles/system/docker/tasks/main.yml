---
- name: Docker | Configure Debian apt repository
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: Docker | Install repository dependencies
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Docker | Create apt keyring directory
      ansible.builtin.file:
        path: "{{ system_docker_apt_keyring_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Docker | Download official apt repository key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: "{{ system_docker_apt_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Docker | Add Debian apt repository
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
        suites: "{{ system_docker_repo_codename | default(ansible_facts['distribution_release']) }}"
        components: stable
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
        signed_by: "{{ system_docker_apt_keyring_path }}"
        state: present
      notify: Docker | Update apt cache

- name: Docker | Flush apt repository handlers
  ansible.builtin.meta: flush_handlers
  when: ansible_facts["os_family"] == "Debian"

- name: Docker | Install packages
  ansible.builtin.package:
    name: "{{ system_docker_engine_packages + system_docker_plugin_packages }}"
    state: present
  notify: Restart docker

- name: Docker | Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: "{{ system_docker_group }}"
    append: true
  become: true

- name: Docker | Enable and start service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true
