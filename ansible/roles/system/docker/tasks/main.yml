---
- name: Docker | Configure Debian apt repository
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: Docker | Install repository dependencies
      ansible.builtin.package:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Docker | Add Debian apt repository with GPG key
      ansible.builtin.deb822_repository:
        name: docker
        types: deb
        uris: "https://download.docker.com/linux/debian"
        suites: "{{ docker_repo_codename | default(ansible_facts['distribution_release']) }}"
        components: stable
        architectures: "{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"
        signed_by: "https://download.docker.com/linux/debian/gpg"
        state: present
      notify: Docker | Update apt cache

- name: Docker | Flush apt repository handlers
  ansible.builtin.meta: flush_handlers
  when: ansible_facts["os_family"] == "Debian"

- name: Docker | Install packages
  ansible.builtin.package:
    name: "{{ system_docker_engine_packages + system_docker_plugin_packages }}"
    state: present
  notify: Restart docker

- name: Docker | Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: "{{ docker_group }}"
    append: true
  become: true

- name: Docker | Enable and start service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true
