---
- name: "Docker | Run {{ ansible_facts.os_family }} tasks"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: Docker | Add user to docker group
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: "{{ docker_group }}"
    append: true
  become: true

- name: Docker | Enable and start service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true
