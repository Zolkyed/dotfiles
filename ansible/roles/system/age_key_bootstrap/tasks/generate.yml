---
- name: Age key bootstrap | Generate new age key
  ansible.builtin.command:
    cmd: age-keygen -o "{{ age_key_file }}"
    creates: "{{ age_key_file }}"
  register: age_keygen_out

- name: Age key bootstrap | Display public key for SOPS recipients
  ansible.builtin.debug:
    msg: "{{ age_keygen_out.stderr }}"
  when: age_keygen_out.stderr | length > 0
