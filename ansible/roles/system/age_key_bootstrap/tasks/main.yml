---
- name: Age key bootstrap | Validate mode
  ansible.builtin.assert:
    that:
      - age_key_mode in ["generate", "import"]
    fail_msg: "age_key_mode must be either 'generate' or 'import'."

- name: Age key bootstrap | Ensure key directory exists
  ansible.builtin.file:
    path: "{{ age_key_dir }}"
    state: directory
    owner: "{{ age_key_owner }}"
    group: "{{ age_key_group }}"
    mode: "0700"

- name: Age key bootstrap | Check if key already exists
  ansible.builtin.stat:
    path: "{{ age_key_file }}"
  register: age_key_stat

- name: Age key bootstrap | Generate key
  ansible.builtin.include_tasks: generate.yml
  when:
    - age_key_mode == "generate"
    - not age_key_stat.stat.exists

- name: Age key bootstrap | Import key
  ansible.builtin.include_tasks: import.yml
  when:
    - age_key_mode == "import"
    - not age_key_stat.stat.exists

- name: Age key bootstrap | Ensure key permissions
  ansible.builtin.file:
    path: "{{ age_key_file }}"
    state: file
    owner: "{{ age_key_owner }}"
    group: "{{ age_key_group }}"
    mode: "0600"
  when: age_key_stat.stat.exists or age_key_mode in ["generate", "import"]
