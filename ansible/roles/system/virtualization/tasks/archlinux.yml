---
- name: Virtualization | Install KVM packages
  community.general.pacman:
    name: "{{ virtualization_kvm_packages }}"
    state: present
  when:
    - virtualization_backend == "kvm"
    - virtualization_kvm_packages | length > 0

- name: Virtualization | Install VirtualBox packages
  community.general.pacman:
    name: "{{ virtualization_virtualbox_packages }}"
    state: present
  when: virtualization_backend == "virtualbox"
