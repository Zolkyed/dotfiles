---
- name: Virtualization | Run Debian tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts["os_family"] | lower == "debian"

- name: Virtualization | Run Arch Linux tasks
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_facts["os_family"] | lower == "archlinux"

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: "{{ system_libvirt_service }}"
    enabled: true
    state: started
  when: system_virtualization_backend == "kvm"

- name: Add user to virtualization groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: "{{ system_virtualization_user_groups }}"
    append: true
  when:
    - system_virtualization_backend == "kvm"
    - system_virtualization_user_groups | length > 0
