---
- name: Virtualization | Enable and start libvirt service
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Virtualization | Add user to virtualization groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups:
      - libvirt
      - kvm
    append: true
