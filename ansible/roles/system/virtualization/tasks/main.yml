---
- name: Virtualization | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Virtualization
    install_pacman_packages: "{{ virtualization_pacman_packages }}"

- name: Virtualization | Enable libvirt sockets
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - libvirtd.socket
    - libvirtd-admin.socket
    - libvirtd-ro.socket

- name: Virtualization | Enable and start libvirt service
  ansible.builtin.systemd_service:
    name: libvirtd
    enabled: true
    state: started

- name: Virtualization | Add user to virtualization groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups:
      - libvirt
      - kvm
    append: true
