---
- name: "Virtualization | Run {{ ansible_facts.os_family }} tasks"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: "{{ system_libvirt_service }}"
    enabled: true
    state: started
  when: system_virtualization_backend == "kvm"

- name: Add user to virtualization groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    groups: "{{ system_virtualization_user_groups }}"
    append: true
  when:
    - system_virtualization_backend == "kvm"
    - system_virtualization_user_groups | length > 0
