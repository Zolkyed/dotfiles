---
- name: Download GPG keys for third-party repos
  ansible.builtin.get_url:
    url: "{{ item.gpg_url }}"
    dest: "{{ item.gpg_dest }}"
    mode: "0644"
  loop: "{{ extra_apt_repos }}"
  when: item.gpg_url is defined

- name: Add third-party apt repositories
  ansible.builtin.deb822_repository:
    name: "{{ item.name }}"
    types: deb
    uris: "{{ item.uri }}"
    suites: "{{ item.suite }}"
    components: "{{ item.components }}"
    signed_by: "{{ item.gpg_dest | default(omit) }}"
    state: present
    enabled: true
  loop: "{{ extra_apt_repos }}"
  notify: Update apt cache

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install packages from third-party repos
  ansible.builtin.package:
    name: "{{ item.packages }}"
    state: present
  loop: "{{ extra_apt_repos }}"
  when: item.packages is defined

