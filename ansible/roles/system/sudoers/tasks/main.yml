---
- name: Sudoers | Allow pacman without password on Arch
  ansible.builtin.copy:
    dest: /etc/sudoers.d/dotfiles-pacman-nopasswd
    content: "{{ system_sudoers_pacman_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman\n"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/bin/visudo -cf %s
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - system_sudoers_pacman_nopasswd
