---
- name: Sudoers | Allow user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/99-dotfiles-nopasswd
    content: "{{ sudoers_user }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: sudoers_nopasswd

- name: Sudoers | Remove passwordless sudo when disabled
  ansible.builtin.file:
    path: /etc/sudoers.d/99-dotfiles-nopasswd
    state: absent
  when: not sudoers_nopasswd