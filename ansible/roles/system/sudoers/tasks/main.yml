---
- name: Sudoers | Allow user passwordless sudo
  ansible.builtin.copy:
    dest: /etc/sudoers.d/99-nopasswd
    content: "{{ sudoers_user }} ALL=(ALL:ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  when: sudoers_nopasswd

- name: Sudoers | Remove archinstall-generated sudo
  ansible.builtin.file:
    path: "/etc/sudoers.d/00_{{ sudoers_user }}"
    state: absent

- name: Sudoers | Remove passwordless sudo when disabled
  ansible.builtin.file:
    path: /etc/sudoers.d/99-nopasswd
    state: absent
  when: not sudoers_nopasswd
