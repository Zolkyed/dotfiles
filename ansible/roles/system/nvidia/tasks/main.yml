---
- name: Install ubuntu-drivers-common (Debian)
  ansible.builtin.package:
    name: ubuntu-drivers-common
    state: present
  when:
    - ansible_facts["os_family"] == "Debian"
    - nvidia_driver_package == "auto"

- name: Auto-install recommended NVIDIA driver (Debian)
  ansible.builtin.command:
    cmd: ubuntu-drivers install
  changed_when: true
  notify: Reboot required
  when:
    - ansible_facts["os_family"] == "Debian"
    - nvidia_driver_package == "auto"

- name: Auto-install NVIDIA driver (Arch)
  ansible.builtin.package:
    name: nvidia
    state: present
  notify: Reboot required
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - nvidia_driver_package == "auto"

- name: Install specific NVIDIA driver package
  ansible.builtin.package:
    name: "{{ nvidia_driver_package }}"
    state: present
  notify: Reboot required
  when: nvidia_driver_package != "auto"

- name: Install NVIDIA packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ nvidia_packages }}"
  register: nvidia_pkg_result
  failed_when: false

- name: Warn about failed NVIDIA package installs
  ansible.builtin.debug:
    msg: "WARNING: Failed to install NVIDIA package '{{ item.item }}' — it may not exist for this distro/kernel."
  loop: "{{ nvidia_pkg_result.results }}"
  when: item.failed | default(false)

- name: Blacklist nouveau driver
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      options nouveau modeset=0
    owner: root
    group: root
    mode: "0644"
  notify: Update initramfs

- name: Set NVIDIA performance mode via udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/60-nvidia-power.rules
    content: |
      # Set NVIDIA PowerMizer to performance mode
      ACTION=="add", SUBSYSTEM=="pci", ATTR{vendor}=="0x10de", ATTR{class}=="0x03[0-9]*", \
        RUN+="/usr/bin/nvidia-smi --persistence-mode=1"
    owner: root
    group: root
    mode: "0644"
  when: nvidia_performance_level == 1
