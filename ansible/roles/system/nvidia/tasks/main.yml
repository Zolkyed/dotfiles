---
- name: Nvidia | Detect installed kernels
  ansible.builtin.shell:
    cmd: set -o pipefail && pacman -Qq | grep -E '^linux(-lts|-zen|-hardened|-rt|-rt-lts)?$'
    executable: /bin/bash
  register: nvidia_arch_kernels
  changed_when: false
  failed_when: false

- name: Nvidia | Install kernel headers
  community.general.pacman:
    name: "{{ nvidia_arch_kernels.stdout_lines | map('regex_replace', '$', '-headers') | list }}"
    state: present
  when: nvidia_arch_kernels.stdout_lines | length > 0

- name: Nvidia | Configure DRM modesetting
  ansible.builtin.copy:
    dest: /etc/modprobe.d/nvidia.conf
    content: "options nvidia_drm modeset=1 fbdev=1\n"
    owner: root
    group: root
    mode: "0644"
  notify: Nvidia | Rebuild initramfs
