---
- name: NVIDIA | Debian
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: NVIDIA | Fail on Debian with auto
      ansible.builtin.fail:
        msg: >
          Set system_nvidia_driver_package in host_vars (e.g. nvidia-driver-560).
          Run: apt install nvidia-detect && nvidia-detect
      when: system_nvidia_driver_package == "auto"

    - name: NVIDIA | Install driver
      ansible.builtin.package:
        name: "{{ system_nvidia_driver_package }}"
        state: present
      notify: Reboot required

    - name: NVIDIA | Install extra packages
      ansible.builtin.package:
        name: "{{ system_nvidia_packages }}"
        state: present
      when: system_nvidia_packages | length > 0

- name: NVIDIA | Arch
  when: ansible_facts["os_family"] == "Archlinux"
  block:
    - name: NVIDIA | Detect GPU
      ansible.builtin.command:
        cmd: lspci -nn
      register: nvidia_arch_lspci
      changed_when: false
      when: system_nvidia_driver_package == "auto"

    - name: NVIDIA | Resolve driver
      ansible.builtin.set_fact:
        _nvidia_pkg: >-
          {{
            system_nvidia_arch_legacy_package
            if (
              system_nvidia_driver_package == "auto" and
              nvidia_arch_lspci.stdout is search(system_nvidia_arch_legacy_gpu_regex)
            )
            else system_nvidia_arch_open_package
            if system_nvidia_driver_package == "auto"
            else system_nvidia_driver_package
          }}
        _nvidia_src: >-
          {{
            'aur'
            if (
              system_nvidia_driver_package == "auto" and
              nvidia_arch_lspci.stdout is search(system_nvidia_arch_legacy_gpu_regex)
            )
            else system_nvidia_driver_package_source
          }}
        _nvidia_aur_base: >-
          {{
            system_nvidia_arch_legacy_package_base
            if (
              system_nvidia_driver_package == "auto" and
              nvidia_arch_lspci.stdout is search(system_nvidia_arch_legacy_gpu_regex)
            )
            else system_nvidia_driver_package
          }}

    - name: NVIDIA | Install pacman driver
      community.general.pacman:
        name: "{{ _nvidia_pkg }}"
        state: present
      notify: Reboot required
      when: _nvidia_src == "pacman"

    - name: NVIDIA | Install AUR driver
      when: _nvidia_src == "aur"
      block:
        - name: NVIDIA | Check installed AUR driver
          ansible.builtin.command:
            cmd: "pacman -Q {{ _nvidia_pkg }}"
          register: nvidia_aur_package_check
          changed_when: false
          failed_when: false

        - name: NVIDIA | Check installed AUR 32-bit driver
          ansible.builtin.command:
            cmd: "pacman -Q {{ system_nvidia_arch_legacy_lib32_package }}"
          register: nvidia_aur_lib32_package_check
          changed_when: false
          failed_when: false

        - name: NVIDIA | Install kernel headers
          community.general.pacman:
            name: "{{ system_nvidia_kernel_header_packages }}"
            state: present
          when:
            - nvidia_aur_package_check.rc != 0 or nvidia_aur_lib32_package_check.rc != 0
            - system_nvidia_kernel_header_packages | length > 0

        - name: NVIDIA | Install AUR build packages
          community.general.pacman:
            name: "{{ system_aur_build_packages }}"
            state: present
          when: nvidia_aur_package_check.rc != 0 or nvidia_aur_lib32_package_check.rc != 0

        - name: NVIDIA | Create AUR build parent
          ansible.builtin.file:
            path: "{{ system_nvidia_aur_build_parent }}"
            state: directory
            owner: "{{ user_name }}"
            group: "{{ user_name }}"
            mode: "0755"
          when: nvidia_aur_package_check.rc != 0 or nvidia_aur_lib32_package_check.rc != 0

        - name: NVIDIA | Create AUR build root
          ansible.builtin.tempfile:
            state: directory
            path: "{{ system_nvidia_aur_build_parent }}"
            prefix: nvidia-aur-
          register: nvidia_aur_build_root
          become: true
          become_user: "{{ user_name }}"
          when: nvidia_aur_package_check.rc != 0 or nvidia_aur_lib32_package_check.rc != 0

        - name: NVIDIA | Build and install missing AUR packages
          when: nvidia_aur_package_check.rc != 0 or nvidia_aur_lib32_package_check.rc != 0
          block:
            - name: NVIDIA | Build and install {{ _nvidia_pkg }}
              when: nvidia_aur_package_check.rc != 0
              block:
                - name: NVIDIA | Clone {{ _nvidia_pkg }} sources
                  ansible.builtin.git:
                    repo: "https://aur.archlinux.org/{{ _nvidia_aur_base }}.git"
                    dest: "{{ nvidia_aur_build_root.path }}/{{ _nvidia_aur_base }}"
                    depth: 1
                    version: HEAD
                  become: true
                  become_user: "{{ user_name }}"

                - name: NVIDIA | Build {{ _nvidia_pkg }}
                  ansible.builtin.command:
                    cmd: makepkg --noconfirm
                    chdir: "{{ nvidia_aur_build_root.path }}/{{ _nvidia_aur_base }}"
                  become: true
                  become_user: "{{ user_name }}"
                  environment:
                    HOME: "{{ user_home }}"

                - name: NVIDIA | Find {{ _nvidia_pkg }} packages
                  ansible.builtin.find:
                    paths: "{{ nvidia_aur_build_root.path }}/{{ _nvidia_aur_base }}"
                    patterns: "*.pkg.tar.zst"
                    file_type: file
                  register: nvidia_aur_packages

                - name: NVIDIA | Assert {{ _nvidia_pkg }} package was built
                  ansible.builtin.assert:
                    that:
                      - nvidia_aur_packages.files | length > 0
                    fail_msg: "No built packages found."

                - name: NVIDIA | Install {{ _nvidia_pkg }} packages
                  ansible.builtin.command:
                    argv: "{{ ['pacman', '-U', '--noconfirm'] + (nvidia_aur_packages.files | map(attribute='path') | list) }}"
                  notify: Reboot required

            - name: NVIDIA | Build and install {{ system_nvidia_arch_legacy_lib32_package }}
              when: nvidia_aur_lib32_package_check.rc != 0
              block:
                - name: NVIDIA | Clone {{ system_nvidia_arch_legacy_lib32_package }} sources
                  ansible.builtin.git:
                    repo: "https://aur.archlinux.org/{{ system_nvidia_arch_legacy_lib32_package_base }}.git"
                    dest: "{{ nvidia_aur_build_root.path }}/{{ system_nvidia_arch_legacy_lib32_package_base }}"
                    depth: 1
                    version: HEAD
                  become: true
                  become_user: "{{ user_name }}"

                - name: NVIDIA | Build {{ system_nvidia_arch_legacy_lib32_package }}
                  ansible.builtin.command:
                    cmd: makepkg --noconfirm
                    chdir: "{{ nvidia_aur_build_root.path }}/{{ system_nvidia_arch_legacy_lib32_package_base }}"
                  become: true
                  become_user: "{{ user_name }}"
                  environment:
                    HOME: "{{ user_home }}"

                - name: NVIDIA | Find {{ system_nvidia_arch_legacy_lib32_package }} packages
                  ansible.builtin.find:
                    paths: "{{ nvidia_aur_build_root.path }}/{{ system_nvidia_arch_legacy_lib32_package_base }}"
                    patterns: "*.pkg.tar.zst"
                    file_type: file
                  register: nvidia_aur_lib32_packages

                - name: NVIDIA | Assert {{ system_nvidia_arch_legacy_lib32_package }} package was built
                  ansible.builtin.assert:
                    that:
                      - nvidia_aur_lib32_packages.files | length > 0
                    fail_msg: "No built packages found."

                - name: NVIDIA | Install {{ system_nvidia_arch_legacy_lib32_package }} packages
                  ansible.builtin.command:
                    argv: "{{ ['pacman', '-U', '--noconfirm'] + (nvidia_aur_lib32_packages.files | map(attribute='path') | list) }}"
                  notify: Reboot required
          always:
            - name: NVIDIA | Remove AUR build root
              ansible.builtin.file:
                path: "{{ nvidia_aur_build_root.path }}"
                state: absent

    - name: NVIDIA | Install extra packages
      community.general.pacman:
        name: "{{ system_nvidia_packages }}"
        state: present
      when: system_nvidia_packages | length > 0

- name: NVIDIA | Blacklist nouveau
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      options nouveau modeset=0
    owner: root
    group: root
    mode: "0644"
  notify: Update initramfs

- name: NVIDIA | Enable persistence daemon
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
  when: system_nvidia_persistence_enabled
