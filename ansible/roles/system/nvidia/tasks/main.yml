---
- name: NVIDIA | Ubuntu auto-install
  when:
    - ansible_facts["distribution"] == "Ubuntu"
    - nvidia_driver_package == "auto"
  block:
    - name: Install ubuntu-drivers-common
      ansible.builtin.package:
        name: ubuntu-drivers-common
        state: present

    - name: Check if NVIDIA driver already installed
      ansible.builtin.command:
        cmd: dpkg -l nvidia-driver-*
      register: nvidia_installed
      changed_when: false
      failed_when: false

    - name: Auto-install recommended driver
      ansible.builtin.command:
        cmd: ubuntu-drivers install
      changed_when: true
      notify: Reboot required
      when: nvidia_installed.rc != 0

- name: NVIDIA | Fail on Debian with auto
  ansible.builtin.fail:
    msg: >
      Set nvidia_driver_package in host_vars (e.g. nvidia-driver-560).
      Run: apt install nvidia-detect && nvidia-detect
  when:
    - ansible_facts["distribution"] == "Debian"
    - nvidia_driver_package == "auto"

- name: NVIDIA | Arch auto-install
  ansible.builtin.package:
    name: nvidia
    state: present
  notify: Reboot required
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - nvidia_driver_package == "auto"

- name: NVIDIA | Install specific driver package
  ansible.builtin.package:
    name: "{{ nvidia_driver_package }}"
    state: present
  notify: Reboot required
  when: nvidia_driver_package != "auto"

- name: NVIDIA | Install extra packages
  ansible.builtin.package:
    name: "{{ nvidia_packages }}"
    state: present
  when: nvidia_packages | default([]) | length > 0

- name: NVIDIA | Blacklist nouveau
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-nouveau.conf
    content: |
      blacklist nouveau
      options nouveau modeset=0
    owner: root
    group: root
    mode: "0644"
  notify: Update initramfs

- name: NVIDIA | Enable persistence daemon
  ansible.builtin.systemd:
    name: nvidia-persistenced
    enabled: true
    state: started
  when: nvidia_performance_level | int == 1
