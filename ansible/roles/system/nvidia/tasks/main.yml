---
- name: "Nvidia | Run tasks for {{ ansible_facts.os_family }}"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: Nvidia | Configure DRM modesetting
  ansible.builtin.copy:
    dest: /etc/modprobe.d/nvidia.conf
    content: "options nvidia_drm modeset=1 fbdev=1\n"
    owner: root
    group: root
    mode: "0644"
  notify: Rebuild initramfs
