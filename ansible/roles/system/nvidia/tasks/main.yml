---
- name: Nvidia | Detect NVIDIA display adapters
  ansible.builtin.command:
    cmd: "lspci -Dnn -d 10de:"
  register: nvidia_lspci_devices
  changed_when: false
  failed_when: false

- name: Nvidia | Filter NVIDIA display adapters
  ansible.builtin.set_fact:
    nvidia_display_adapters: >-
      {{
        nvidia_lspci_devices.stdout_lines
        | select('search', 'VGA|3D|Display')
        | list
      }}

- name: Nvidia | Require supported NVIDIA display adapter
  ansible.builtin.assert:
    that:
      - nvidia_display_adapters | length > 0
      - nvidia_display_adapters | join('\n') is not search(nvidia_unsupported_legacy_device_regex)
    fail_msg: >-
      No supported NVIDIA display adapter was detected, or the detected adapter
      needs an older legacy branch not managed by this role.

- name: Nvidia | Set driver branch (manual)
  ansible.builtin.set_fact:
    nvidia_effective_driver_branch: "{{ nvidia_driver_branch }}"
  when: nvidia_driver_branch != 'auto'

- name: Nvidia | Set driver branch (auto-detect)
  ansible.builtin.set_fact:
    nvidia_effective_driver_branch: "{{ item }}"
  loop: "{{ nvidia_driver_branch_order }}"
  when:
    - nvidia_driver_branch == 'auto'
    - nvidia_effective_driver_branch is not defined
    - nvidia_driver_packages[item].device_regex | length > 0
    - nvidia_display_adapters | join('\n') is search(nvidia_driver_packages[item].device_regex)

- name: Nvidia | Validate driver branch
  ansible.builtin.assert:
    that:
      - nvidia_effective_driver_branch is defined
      - nvidia_effective_driver_branch in nvidia_driver_packages
    fail_msg: "Unsupported NVIDIA driver branch: {{ nvidia_effective_driver_branch | default('none detected') }}"

- name: Nvidia | Collect installed packages
  ansible.builtin.package_facts:
    manager: pacman

- name: Nvidia | Compute conflicting packages
  ansible.builtin.set_fact:
    nvidia_conflicting_packages: >-
      {{
        nvidia_driver_packages.values()
        | map(attribute='pacman') | flatten
        | union(nvidia_driver_packages.values() | map(attribute='aur') | flatten)
        | difference(nvidia_driver_packages[nvidia_effective_driver_branch].pacman)
        | difference(nvidia_driver_packages[nvidia_effective_driver_branch].aur)
        | intersect(ansible_facts.packages.keys() | list)
      }}

- name: Nvidia | Remove conflicting packages
  community.general.pacman:
    name: "{{ nvidia_conflicting_packages }}"
    state: absent
    extra_args: --noconfirm --nodeps --nodeps
  when: nvidia_conflicting_packages | length > 0
  notify: Nvidia | Rebuild initramfs

- name: Nvidia | Install kernel headers
  community.general.pacman:
    name: "{{ nvidia_arch_kernels | map('regex_replace', '$', '-headers') | list }}"
    state: present
  when: nvidia_arch_kernels | length > 0
  vars:
    nvidia_arch_kernels: >-
      {{
        ansible_facts.packages.keys()
        | select('match', '^linux(-lts|-zen|-hardened|-rt|-rt-lts)?$')
        | list
      }}

- name: Nvidia | Install pacman driver packages
  community.general.pacman:
    name: "{{ nvidia_driver_packages[nvidia_effective_driver_branch].pacman }}"
    state: present
    extra_args: "{{ nvidia_driver_extra_args }}"
  when: nvidia_driver_packages[nvidia_effective_driver_branch].pacman | length > 0
  notify: Nvidia | Rebuild initramfs

- name: Nvidia | Install AUR driver packages
  kewlfft.aur.aur:
    name: "{{ nvidia_driver_packages[nvidia_effective_driver_branch].aur }}"
    use: paru
    state: present
    extra_args: "{{ nvidia_driver_extra_args }}"
  become: false
  when: nvidia_driver_packages[nvidia_effective_driver_branch].aur | length > 0
  notify: Nvidia | Rebuild initramfs

- name: Nvidia | Configure DRM modesetting
  ansible.builtin.copy:
    dest: /etc/modprobe.d/nvidia.conf
    content: "options nvidia_drm modeset=1 fbdev=1\n"
    owner: root
    group: root
    mode: "0644"
  notify: Nvidia | Rebuild initramfs
