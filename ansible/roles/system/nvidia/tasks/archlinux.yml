---
- name: Nvidia | Detect installed kernels
  ansible.builtin.shell:
    cmd: pacman -Qq | grep -E '^linux(-lts|-zen|-hardened|-rt|-rt-lts)?$'
  register: nvidia_arch_kernels
  changed_when: false
  failed_when: false

- name: Nvidia | Install kernel headers
  community.general.pacman:
    name: "{{ nvidia_arch_kernels.stdout_lines | map('regex_replace', '$', '-headers') | list }}"
    state: present
  when: nvidia_arch_kernels.stdout_lines | length > 0

- name: Nvidia | Install driver
  community.general.pacman:
    name: "{{ nvidia_packages_arch }}"
    state: present
