---
# Override auto-detection by setting the branch for your GPU:
#   580xx -> GTX 950, GTX 960, GTX 970, GTX 980, GTX 1050, GTX 1060, GTX 1070, GTX 1080
#   500xx -> RTX 5070, RTX 5080, RTX 5090
#   current -> RTX 2060, RTX 2080, RTX 3060, RTX 3080, RTX 3090, RTX 4070, RTX 4080, RTX 4090
nvidia_driver_branch: auto

# Adding support for a new GPU:
#   1. Find the chip prefix: run 'lspci -Dnn -d 10de:' and look for the chip code e.g. GB203, GC102
#      The prefix is the letters before the number: GB203 -> GB
#   2. Find the AUR packages: run 'paru -Ss nvidia | grep <branch>' e.g. 'paru -Ss nvidia | grep 700xx'
#   3. Add a new entry to nvidia_driver_packages below with the chip prefix and AUR packages

nvidia_unsupported_chip_prefixes:
  - G8
  - G9
  - GT2
  - GF
  - GK

nvidia_proprietary_mkinitcpio_modules:
  - nvidia
  - nvidia_modeset
  - nvidia_uvm
  - nvidia_drm

nvidia_driver_packages:
  580xx:
    chip_prefixes:
      - GM
      - GP
    mkinitcpio_modules: "{{ nvidia_proprietary_mkinitcpio_modules }}"
    aur:
      - nvidia-580xx-dkms
      - nvidia-580xx-utils
      - lib32-nvidia-580xx-utils
      - nvidia-580xx-settings
      - opencl-nvidia-580xx
      - lib32-opencl-nvidia-580xx

  500xx:
    chip_prefixes:
      - GB
    mkinitcpio_modules: "{{ nvidia_proprietary_mkinitcpio_modules }}"
    aur:
      - nvidia-500xx-dkms
      - nvidia-500xx-utils
      - lib32-nvidia-500xx-utils
      - nvidia-500xx-settings
      - opencl-nvidia-500xx
      - lib32-opencl-nvidia-500xx

  current:
    chip_prefixes:
      - TU
      - GA
      - AD
    pacman:
      - nvidia-open-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - opencl-nvidia
      - lib32-opencl-nvidia
