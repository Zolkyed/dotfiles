---
nvidia_driver_branch: auto

nvidia_unsupported_legacy_device_regex: '\b(G8|G9|GT2|GF|GK)[0-9]+'

# Checked in order; first match wins. Branches with no device_regex require manual override.
nvidia_driver_branch_order:
  - 580xx
  - current

nvidia_driver_packages:
  current:
    device_regex: '\b(TU|GA|AD|GB)[0-9]+'
    pacman:
      - nvidia-open-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - opencl-nvidia
      - lib32-opencl-nvidia
    aur: []

  500xx:
    device_regex: ''
    pacman: []
    aur:
      - nvidia-500xx-dkms
      - nvidia-500xx-utils
      - lib32-nvidia-500xx-utils
      - nvidia-500xx-settings
      - opencl-nvidia-500xx
      - lib32-opencl-nvidia-500xx

  580xx:
    device_regex: '\b(GM|GP)[0-9]+'
    pacman: []
    aur:
      - nvidia-580xx-dkms
      - nvidia-580xx-utils
      - lib32-nvidia-580xx-utils
      - nvidia-580xx-settings
      - opencl-nvidia-580xx
      - lib32-opencl-nvidia-580xx

nvidia_driver_extra_args: --noconfirm
