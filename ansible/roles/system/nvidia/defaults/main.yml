---
# How to find your GPU chip code:
#   Run: lspci -Dnn -d 10de:
#   Example output: 0000:01:00.0 VGA compatible controller [0300]: NVIDIA Corporation GP104 [GeForce GTX 1080] [10de:1b80]
#   The chip code is the part before the bracketed name -> GP104
#   The letters before the digits are the prefix  -> GP  (matches 580xx branch)
#
# Override auto-detection by setting nvidia_driver_branch to the right branch for your GPU:
#   580xx -> GTX 900 series (Maxwell), GTX 1000 series (Pascal) e.g. GTX 950, 1060, 1080  (GM/GP prefix)
#   500xx -> RTX 5000 series (Blackwell) e.g. RTX 5070, 5080, 5090                         (GB prefix)
#   current -> RTX 2000/3000/4000 series (Turing/Ampere/Ada) e.g. RTX 2080, 3080, 4090    (TU/GA/AD prefix)
#
# To add a new branch:
#   1. Run lspci -Dnn -d 10de: and note the chip code e.g. GC102
#   2. Extract the prefix (letters only): GC102 -> GC
#   3. Add a new entry below with device_regex: '\b(GC)[0-9]+'
#   4. Find AUR packages: paru -Ss nvidia | grep <branch-name>
nvidia_driver_branch: auto

nvidia_unsupported_legacy_device_regex: '\b(G8|G9|GT2|GF|GK)[0-9]+'

nvidia_proprietary_mkinitcpio_modules:
  - nvidia
  - nvidia_modeset
  - nvidia_uvm
  - nvidia_drm

nvidia_driver_packages:
  580xx:
    device_regex: '\b(GM|GP)[0-9]+'
    mkinitcpio_modules: "{{ nvidia_proprietary_mkinitcpio_modules }}"
    aur:
      - nvidia-580xx-dkms
      - nvidia-580xx-utils
      - lib32-nvidia-580xx-utils
      - nvidia-580xx-settings
      - opencl-nvidia-580xx
      - lib32-opencl-nvidia-580xx

  500xx:
    device_regex: '\b(GB)[0-9]+'
    mkinitcpio_modules: "{{ nvidia_proprietary_mkinitcpio_modules }}"
    aur:
      - nvidia-500xx-dkms
      - nvidia-500xx-utils
      - lib32-nvidia-500xx-utils
      - nvidia-500xx-settings
      - opencl-nvidia-500xx
      - lib32-opencl-nvidia-500xx

  current:
    device_regex: '\b(TU|GA|AD)[0-9]+'
    pacman:
      - nvidia-open-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - opencl-nvidia
      - lib32-opencl-nvidia
