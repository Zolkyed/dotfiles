---
- name: Journald | Ensure configuration directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Journald | Deploy retention configuration
  ansible.builtin.template:
    src: retention.conf.j2
    dest: /etc/systemd/journald.conf.d/00-dotfiles-retention.conf
    owner: root
    group: root
    mode: "0644"
  notify: Journald | Restart systemd-journald
