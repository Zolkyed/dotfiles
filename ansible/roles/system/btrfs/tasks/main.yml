---
- name: Btrfs | Install packages
  ansible.builtin.package:
    name: "{{ system_btrfs_packages }}"
    state: present
  when:
    - system_btrfs_manage_packages
    - system_btrfs_packages | length > 0

- name: Btrfs | Ensure subvolume parent directories exist
  ansible.builtin.file:
    path: "{{ item.path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ system_btrfs_subvolumes }}"
  loop_control:
    label: "{{ item.path }}"

- name: Btrfs | Check subvolumes
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop: "{{ system_btrfs_subvolumes }}"
  loop_control:
    label: "{{ item.path }}"
  register: system_btrfs_subvolume_stats

- name: Btrfs | Create subvolumes
  ansible.builtin.command:
    cmd: "btrfs subvolume create {{ item.item.path }}"
  loop: "{{ system_btrfs_subvolume_stats.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when: not item.stat.exists
  changed_when: true

- name: Btrfs | Apply subvolume ownership and mode
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode | default('0755') }}"
    state: directory
  loop: "{{ system_btrfs_subvolumes }}"
  loop_control:
    label: "{{ item.path }}"

- name: Btrfs | Manage mount entries
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype | default('btrfs') }}"
    opts: "{{ item.opts | join(',') if (item.opts is sequence and item.opts is not string) else item.opts | default(omit) }}"
    dump: "{{ item.dump | default('0') }}"
    passno: "{{ item.passno | default('0') }}"
    state: "{{ item.state | default('mounted') }}"
  loop: "{{ system_btrfs_mounts }}"
  loop_control:
    label: "{{ item.path }}"

- name: Btrfs | Check quota status
  ansible.builtin.command:
    cmd: "btrfs quota show {{ system_btrfs_quota_mountpoint }}"
  register: system_btrfs_quota_status
  changed_when: false
  failed_when: false
  when: system_btrfs_enable_quotas

- name: Btrfs | Enable quotas
  ansible.builtin.command:
    cmd: "btrfs quota enable {{ system_btrfs_quota_mountpoint }}"
  when:
    - system_btrfs_enable_quotas
    - system_btrfs_quota_status.rc != 0
      or 'not enabled' in (system_btrfs_quota_status.stdout | lower)
      or 'not enabled' in (system_btrfs_quota_status.stderr | lower)
  changed_when: true

- name: Btrfs | Configure scrub timer
  ansible.builtin.systemd:
    name: "{{ system_btrfs_scrub_timer }}"
    enabled: "{{ system_btrfs_enable_scrub_timer }}"
    state: "{{ 'started' if system_btrfs_enable_scrub_timer else 'stopped' }}"

- name: Btrfs | Configure balance timer
  ansible.builtin.systemd:
    name: "{{ system_btrfs_balance_timer }}"
    enabled: "{{ system_btrfs_enable_balance_timer }}"
    state: "{{ 'started' if system_btrfs_enable_balance_timer else 'stopped' }}"
