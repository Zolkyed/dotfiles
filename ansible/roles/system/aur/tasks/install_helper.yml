---
- name: AUR | Clone paru repository
  ansible.builtin.git:
    repo: "{{ system_paru_repo }}"
    dest: "{{ system_paru_build_dir }}"
    depth: 1
    version: master
  become: true
  become_user: "{{ user_name }}"

- name: AUR | Build paru package
  ansible.builtin.command:
    cmd: makepkg --noconfirm
    chdir: "{{ system_paru_build_dir }}"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: AUR | Find built paru package
  ansible.builtin.find:
    paths: "{{ system_paru_build_dir }}"
    patterns: "paru-*.pkg.tar.*"
    file_type: file
  register: system_paru_built_packages

- name: AUR | Assert paru package was built
  ansible.builtin.assert:
    that:
      - system_paru_built_packages.files | length > 0
    fail_msg: "No built package found for paru."

- name: AUR | Install paru package
  ansible.builtin.command:
    argv: "{{ ['pacman', '-U', '--noconfirm'] + (system_paru_built_packages.files | map(attribute='path') | list) }}"
  changed_when: true

- name: AUR | Clean helper build directory
  ansible.builtin.file:
    path: "{{ system_paru_build_dir }}"
    state: absent
