---
- name: Aur | Install build prerequisites
  community.general.pacman:
    name:
      - base-devel
      - git
    state: present

- name: Aur | Install paru
  kewlfft.aur.aur:
    name: paru
    use: makepkg
    state: present
  become: true
  become_user: "{{ user_name }}"

- name: Aur | Configure paru
  ansible.builtin.template:
    src: paru.conf.j2
    dest: /etc/paru.conf
    owner: root
    group: root
    mode: "0644"
