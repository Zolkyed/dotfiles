---
- name: Firewall | Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ firewall_default_incoming }}"

- name: Firewall | Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ firewall_default_outgoing }}"

- name: Firewall | Allow configured TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allow_ports }}"

- name: Firewall | Allow configured UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_allow_ports_udp }}"
  when: firewall_allow_ports_udp | length > 0

- name: Firewall | Apply ufw ruleset
  community.general.ufw:
    state: enabled

- name: Firewall | Enable and start ufw service
  ansible.builtin.systemd_service:
    name: ufw
    enabled: true
    state: started
