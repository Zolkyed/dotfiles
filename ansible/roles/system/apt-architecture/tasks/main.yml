---
- name: Check registered architectures
  ansible.builtin.command:
    cmd: dpkg --print-foreign-architectures
  register: foreign_archs
  changed_when: false

- name: Register i386 architecture
  ansible.builtin.command:
    cmd: dpkg --add-architecture i386
  when: "'i386' not in foreign_archs.stdout_lines"
  notify: Update apt cache

- name: Flush handlers to apply cache update
  ansible.builtin.meta: flush_handlers
