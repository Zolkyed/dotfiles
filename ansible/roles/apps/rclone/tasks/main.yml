---
- name: Rclone | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Rclone
    install_pacman_packages: "{{ rclone_pacman_packages }}"

- name: Rclone | Ensure config directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/rclone"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0700"

- name: Rclone | Deploy config
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ rclone_conf_dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
  no_log: true
