---
- name: Hayase | Check if already installed
  ansible.builtin.command:
    cmd: dpkg-query -W -f='${Status}' hayase
  register: hayase_pkg_check
  changed_when: false
  failed_when: false

- name: Hayase | Get latest release info
  ansible.builtin.uri:
    url: "{{ hayase_api_url }}"
    return_content: true
  register: hayase_release
  when: hayase_pkg_check.stdout | default('') != 'install ok installed'

- name: Hayase | Select Debian release asset
  ansible.builtin.set_fact:
    hayase_linux_deb_url: >-
      {{
        hayase_release.json
        | dict2items
        | map(attribute='value')
        | select('match', '^https://.*/linux-hayase-.*-linux[.]deb$')
        | first
        | default('')
      }}
  when: hayase_release is not skipped

- name: Hayase | Assert Debian asset was found
  ansible.builtin.assert:
    that:
      - hayase_linux_deb_url | length > 0
    fail_msg: "No matching Hayase Debian asset found in {{ hayase_api_url }} response."
  when: hayase_release is not skipped

- name: Hayase | Install from .deb
  ansible.builtin.apt:
    deb: "{{ hayase_linux_deb_url }}"
    state: present
  when: hayase_pkg_check.stdout | default('') != 'install ok installed'
