---
- name: Check if Hayase is already installed
  ansible.builtin.command:
    cmd: dpkg-query -W -f='${Status}' hayase
  register: apps_hayase_pkg_check
  changed_when: false
  failed_when: false
  when: ansible_facts["os_family"] == "Debian"

- name: Check if Hayase AppImage exists
  ansible.builtin.stat:
    path: "{{ apps_hayase_appimage_dest }}"
  register: apps_hayase_appimage_stat
  when: ansible_facts["os_family"] == "Archlinux"

- name: Get Hayase latest release info
  ansible.builtin.uri:
    url: "{{ apps_hayase_api_url }}"
    return_content: true
  register: apps_hayase_release
  when: >
    (ansible_facts["os_family"] == "Debian" and
     apps_hayase_pkg_check.stdout | default('') != 'install ok installed')
    or
    (ansible_facts["os_family"] == "Archlinux" and
     not (apps_hayase_appimage_stat.stat.exists | default(false)))

- name: Select Hayase Linux release assets
  ansible.builtin.set_fact:
    apps_hayase_linux_deb_url: >-
      {{
        apps_hayase_release.json
        | dict2items
        | map(attribute='value')
        | select('match', '^https://.*/linux-hayase-.*-linux[.]deb$')
        | first
        | default('')
      }}
    apps_hayase_linux_appimage_url: >-
      {{
        apps_hayase_release.json
        | dict2items
        | map(attribute='value')
        | select('match', '^https://.*/linux-hayase-.*-linux[.]AppImage$')
        | first
        | default('')
      }}
  when: apps_hayase_release is not skipped

- name: Assert Hayase Linux asset was found
  ansible.builtin.assert:
    that:
      - >
        (ansible_facts["os_family"] == "Debian" and apps_hayase_linux_deb_url | length > 0) or
        (ansible_facts["os_family"] == "Archlinux" and apps_hayase_linux_appimage_url | length > 0)
    fail_msg: "No matching Hayase Linux asset found in {{ apps_hayase_api_url }} response."
  when: apps_hayase_release is not skipped

- name: Install Hayase from .deb (Debian)
  ansible.builtin.apt:
    deb: "{{ apps_hayase_linux_deb_url }}"
    state: present
  when:
    - ansible_facts["os_family"] == "Debian"
    - apps_hayase_pkg_check.stdout | default('') != 'install ok installed'

- name: Install Hayase AppImage (Arch)
  ansible.builtin.get_url:
    url: "{{ apps_hayase_linux_appimage_url }}"
    dest: "{{ apps_hayase_appimage_dest }}"
    mode: "0755"
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - not (apps_hayase_appimage_stat.stat.exists | default(false))
