---
- name: AI | Locate npm from nvm
  ansible.builtin.shell:
    cmd: |
      source "{{ user_home }}/.nvm/nvm.sh"
      command -v npm
    executable: /bin/bash
  register: apps_ai_npm_path
  changed_when: false
  become: true
  become_user: "{{ user_name }}"

- name: AI | Install npm CLIs
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
    executable: "{{ apps_ai_npm_path.stdout }}"
  loop: "{{ apps_ai_npm_packages }}"
  become: true
  become_user: "{{ user_name }}"
