---
- name: AI | Ensure NVM directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.nvm"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: AI | Install Node with NVM
  ansible.builtin.shell:
    cmd: |
      source /usr/share/nvm/nvm.sh
      nvm install {{ ai_node_version }}
      nvm alias default "$(nvm version {{ ai_node_version }})"
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  environment:
    NVM_DIR: "{{ user_home }}/.nvm"
  register: node_install
  changed_when: "'already installed' not in node_install.stdout"

- name: AI | Get NVM npm path
  ansible.builtin.shell:
    cmd: |
      source /usr/share/nvm/nvm.sh
      nvm use default >/dev/null
      which npm
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  environment:
    NVM_DIR: "{{ user_home }}/.nvm"
  register: nvm_npm_path
  changed_when: false

- name: AI | Install global npm packages
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
    executable: "{{ nvm_npm_path.stdout }}"
  become: true
  become_user: "{{ user_name }}"
  loop: "{{ profiles.ai.npm | default([]) }}"
