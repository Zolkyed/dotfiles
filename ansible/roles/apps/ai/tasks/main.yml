---
- name: AI | Install npm CLIs
  ansible.builtin.shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    source "$NVM_DIR/nvm.sh"
    nvm use default >/dev/null
    npm list -g --depth=0 {{ item }} &>/dev/null || npm install -g {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ ai_npm_packages }}"
  become: true
  become_user: "{{ user_name }}"
  changed_when: "'added' in _ai_npm_result.stdout"
  register: _ai_npm_result
