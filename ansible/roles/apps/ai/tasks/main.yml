- name: AI | Locate npm from nvm
  ansible.builtin.shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    source "$NVM_DIR/nvm.sh"
    NODE_PATH="$(nvm which current)"
    dirname "$NODE_PATH"
  args:
    executable: /bin/bash
  register: apps_ai_node_bin
  changed_when: false
  become: true
  become_user: "{{ user_name }}"

- name: AI | Install npm CLIs
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: present
    executable: "{{ apps_ai_node_bin.stdout }}/npm"
  loop: "{{ apps_ai_npm_packages }}"
  become: true
  become_user: "{{ user_name }}"