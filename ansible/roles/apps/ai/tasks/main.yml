---
- name: AI | Install tools with Volta
  ansible.builtin.command:
    cmd: volta install {{ item }}
  become: true
  become_user: "{{ user_name }}"
  environment:
    VOLTA_HOME: "{{ user_home }}/.volta"
    PATH: "{{ user_home }}/.volta/bin:{{ ansible_facts.env.PATH }}"
  loop: "{{ ai_npm_packages }}"
  changed_when: false
