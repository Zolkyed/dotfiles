- name: AI | Install npm CLIs
  ansible.builtin.shell: |
    set -euo pipefail

    export NVM_DIR="{{ user_home }}/.nvm"
    source "$NVM_DIR/nvm.sh"

    nvm use {{ nodejs_version }} >/dev/null

    npm install -g {{ item }}
  args:
    executable: /bin/bash
  loop: "{{ apps_ai_npm_packages }}"
  become: true
  become_user: "{{ user_name }}"