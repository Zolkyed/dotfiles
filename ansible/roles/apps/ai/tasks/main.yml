- name: AI | Check nvm.sh exists and is readable
  ansible.builtin.stat:
    path: "{{ user_home }}/.nvm/nvm.sh"
  register: nvm_stat
  become: true
  become_user: "{{ user_name }}"

- name: AI | Debug nvm stat
  ansible.builtin.debug:
    var: nvm_stat.stat

- name: AI | Locate npm from nvm
  ansible.builtin.shell:
    cmd: . {{ user_home }}/.nvm/nvm.sh && command -v npm
    executable: /bin/bash
  register: apps_ai_npm_path
  changed_when: false
  become: true
  become_user: "{{ user_name }}"

- name: AI | Debug npm path
  ansible.builtin.debug:
    var: apps_ai_npm_path