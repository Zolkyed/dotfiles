---
- name: AI | Install Node LTS with volta
  ansible.builtin.command:
    cmd: volta install node@lts
  become: true
  become_user: "{{ user_name }}"
  environment:
    VOLTA_HOME: "{{ user_home }}/.volta"
    PATH: "{{ user_home }}/.volta/bin:{{ ansible_env.PATH }}"
  changed_when: false

- name: AI | Install global npm tools with volta
  ansible.builtin.command:
    cmd: volta install {{ item }}
  become: true
  become_user: "{{ user_name }}"
  environment:
    VOLTA_HOME: "{{ user_home }}/.volta"
    PATH: "{{ user_home }}/.volta/bin:{{ ansible_env.PATH }}"
  loop: "{{ profiles.ai.npm | default([]) }}"
  changed_when: false
