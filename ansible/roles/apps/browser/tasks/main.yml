---
- name: "Browser | Run tasks for {{ ansible_facts.os_family }}"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ browser_policy_dir }}/{{ browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
