---
- name: Browser | Run Debian tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts["os_family"] | lower == "debian"

- name: Browser | Run Arch Linux tasks
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_facts["os_family"] | lower == "archlinux"

- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ apps_browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ apps_browser_policy_dir }}/{{ apps_browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
