---
- name: Browser | Install
  ansible.builtin.include_role:
    name: lib/install
    tasks_from: packages
  vars:
    install_label: Browser
    install_aur_packages: "{{ browser_aur_packages }}"

- name: Browser | Ensure managed policy directory exists
  ansible.builtin.file:
    path: "{{ browser_policy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Browser | Deploy managed policy
  ansible.builtin.template:
    src: browser-policy.json.j2
    dest: "{{ browser_policy_dir }}/{{ browser_policy_file }}"
    owner: root
    group: root
    mode: "0644"
