---
- name: Mihon | Ensure applications directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/applications"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Ensure icons directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/icons"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Download icon
  block:
    - name: Mihon | Download icon from URL
      ansible.builtin.get_url:
        url: "{{ mihon_icon_url }}"
        dest: "{{ mihon_icon_dest }}"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
  rescue:
    - name: Mihon | Fall back to local icon
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/assets/mihon.png"
        dest: "{{ mihon_icon_dest }}"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"

- name: Mihon | Deploy desktop entry
  ansible.builtin.copy:
    dest: "{{ mihon_desktop_dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Name=Mihon
      Exec={{ mihon_browser }} --app={{ mihon_url }}
      Terminal=false
      Type=Application
      Categories=Internet;
      StartupWMClass={{ mihon_wm_class }}
      Icon={{ mihon_icon_dest }}
