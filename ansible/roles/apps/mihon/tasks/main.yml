---
- name: Mihon | Ensure applications directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/applications"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Ensure icons directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/icons"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Mihon | Download icon
  block:
    - name: Mihon | Download icon from URL
      ansible.builtin.get_url:
        url: "{{ mihon_icon_url }}"
        dest: "{{ mihon_icon_dest }}"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
  rescue:
    - name: Mihon | Fall back to local icon
      ansible.builtin.copy:
        src: "{{ mihon_icon_fallback_src }}"
        dest: "{{ mihon_icon_dest }}"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"

- name: Mihon | Deploy desktop entry
  ansible.builtin.template:
    src: mihon.desktop.j2
    dest: "{{ mihon_desktop_dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
