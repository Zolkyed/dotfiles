---
- name: Gaming | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Gaming
    install_pacman_packages: "{{ gaming_pacman_packages }}"
    install_aur_packages: "{{ gaming_aur_packages }}"
    install_flatpak_packages: "{{ gaming_flatpak_packages }}"
