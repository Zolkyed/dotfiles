---
- name: VS Code | Configure Debian apt repository
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: VS Code | Install repository dependencies
      ansible.builtin.package:
        name:
          - apt-transport-https
          - ca-certificates
          - gpg
          - wget
        state: present

    - name: VS Code | Create apt keyring directory
      ansible.builtin.file:
        path: "{{ apps_vscode_apt_keyring_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: VS Code | Download Microsoft apt repository key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: "{{ apps_vscode_apt_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: VS Code | Add Microsoft apt repository
      ansible.builtin.deb822_repository:
        name: vscode
        types: deb
        uris: https://packages.microsoft.com/repos/code
        suites: stable
        components: main
        architectures:
          - amd64
          - arm64
          - armhf
        signed_by: "{{ apps_vscode_apt_keyring_path }}"
        state: present
      notify: VS Code | Update apt cache

- name: VS Code | Flush apt repository handlers
  ansible.builtin.meta: flush_handlers
  when: ansible_facts["os_family"] == "Debian"

- name: VS Code | Install Debian package
  ansible.builtin.apt:
    name: "{{ apps_vscode_apt_package }}"
    state: present
  when: ansible_facts["os_family"] == "Debian"

- name: VS Code | Install Arch package from AUR  # noqa var-naming[no-role-prefix]
  ansible.builtin.include_role:
    name: system/aur
    tasks_from: install_packages
  vars:
    system_aur_install_packages:
      - "{{ apps_vscode_aur_package }}"
  when: ansible_facts["os_family"] == "Archlinux"
