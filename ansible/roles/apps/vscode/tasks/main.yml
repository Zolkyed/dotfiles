---
- name: VS Code | Configure Debian apt repository
  when: ansible_facts["os_family"] == "Debian"
  block:
    - name: VS Code | Install repository dependencies
      ansible.builtin.package:
        name:
          - apt-transport-https
          - ca-certificates
          - gpg
          - wget
        state: present

    - name: VS Code | Create apt keyring directory
      ansible.builtin.file:
        path: "{{ apps_vscode_apt_keyring_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: VS Code | Download Microsoft apt repository key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: "{{ apps_vscode_apt_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: VS Code | Add Microsoft apt repository
      ansible.builtin.deb822_repository:
        name: vscode
        types: deb
        uris: https://packages.microsoft.com/repos/code
        suites: stable
        components: main
        architectures:
          - amd64
          - arm64
          - armhf
        signed_by: "{{ apps_vscode_apt_keyring_path }}"
        state: present
      notify: VS Code | Update apt cache

- name: VS Code | Flush apt repository handlers
  ansible.builtin.meta: flush_handlers
  when: ansible_facts["os_family"] == "Debian"

- name: VS Code | Install Debian package
  ansible.builtin.apt:
    name: "{{ apps_vscode_apt_package }}"
    state: present
  when: ansible_facts["os_family"] == "Debian"

- name: VS Code | Check Arch package
  ansible.builtin.command:
    cmd: "pacman -Q {{ apps_vscode_aur_package }}"
  register: apps_vscode_arch_package_check
  changed_when: false
  failed_when: false
  when: ansible_facts["os_family"] == "Archlinux"

- name: VS Code | Install Arch package from AUR
  ansible.builtin.command:
    argv:
      - paru
      - -S
      - --needed
      - --noconfirm
      - --skipreview
      - "{{ apps_vscode_aur_package }}"
  become: true
  become_user: "{{ user_name }}"
  when:
    - ansible_facts["os_family"] == "Archlinux"
    - apps_vscode_arch_package_check.rc != 0
