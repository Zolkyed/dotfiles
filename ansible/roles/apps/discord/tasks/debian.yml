---
- name: Discord | Check if installed
  ansible.builtin.command: dpkg-query -W discord
  register: discord_installed
  failed_when: false
  changed_when: false

- name: Discord | Download deb package
  ansible.builtin.get_url:
    url: "{{ discord_deb_url }}"
    dest: "{{ discord_deb_dest }}"
    mode: "0644"
  when: discord_installed.rc != 0

- name: Discord | Install deb package
  ansible.builtin.apt:
    deb: "{{ discord_deb_dest }}"
    state: present
  when: discord_installed.rc != 0
