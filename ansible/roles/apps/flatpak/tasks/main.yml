---
- name: Flatpak | Add remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    state: present
  loop: "{{ flatpak_remotes }}"

- name: Flatpak | Install apps
  community.general.flatpak:
    name: "{{ flatpak_apps }}"
    state: present
    remote: flathub
  vars:
    flatpak_apps: >-
      {{
        profiles | dict2items
        | map(attribute='value')
        | map(attribute='flatpak', default=[])
        | flatten
      }}
  when:
    - flatpak_apps | length > 0
