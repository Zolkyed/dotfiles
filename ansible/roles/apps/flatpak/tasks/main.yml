---
- name: Flatpak | Install
  ansible.builtin.include_role:
    name: system/install
    tasks_from: packages
  vars:
    install_label: Flatpak
    install_pacman_packages: "{{ flatpak_pacman_packages }}"
    install_flatpak_packages: "{{ flatpak_flatpak_packages }}"

- name: Flatpak | Add remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    state: present
  loop: "{{ flatpak_remotes }}"
