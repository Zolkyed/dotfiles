---
- name: Flatpak | Add remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    state: present
  loop: "{{ flatpak_remotes }}"

- name: Flatpak | Install apps
  community.general.flatpak:
    name: "{{ flatpak_apps }}"
    state: present
    remote: flathub
  vars:
    flatpak_apps: "{{
      (profiles.utility.flatpak | default([])) +
      (browser_enabled | ternary((profiles.browser.flatpak | default([])), [])) +
      (dev_enabled | ternary((profiles.dev.flatpak | default([])), [])) +
      (media_enabled | ternary((profiles.media.flatpak | default([])), [])) +
      (gaming_enabled | ternary((profiles.gaming.flatpak | default([])), [])) +
      (office_enabled | ternary((profiles.office.flatpak | default([])), []))
    }}"
  when:
    - flatpak_apps | length > 0
