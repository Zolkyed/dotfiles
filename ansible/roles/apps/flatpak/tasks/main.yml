---
- name: "Flatpak | Run {{ ansible_facts.os_family }} tasks"
  ansible.builtin.include_tasks: "{{ ansible_facts.os_family | lower }}.yml"

- name: Check if Plasma is installed before installing Discover backend
  ansible.builtin.command:
    cmd: which plasmashell
  register: flatpak_plasmashell_check
  changed_when: false
  failed_when: false
  when:
    - flatpak_discover_backend_packages | length > 0

- name: Add flatpak remotes
  community.general.flatpak_remote:
    name: "{{ item.name }}"
    flatpakrepo_url: "{{ item.url }}"
    state: present
  loop: "{{ flatpak_remotes }}"

- name: Install flatpak apps
  community.general.flatpak:
    name: "{{ flatpak_apps }}"
    state: present
    remote: flathub
  vars:
    flatpak_apps: >-
      {{
        shared_flatpaks +
        distro_flatpaks +
        (gaming_enabled | ternary(gaming_flatpaks, []))
      }}
  when:
    - flatpak_apps | length > 0
