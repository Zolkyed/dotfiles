---
- name: Bin | Install custom scripts to ~/.local/bin
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ bin_dest }}/{{ item | basename }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  loop: "{{ query('ansible.builtin.fileglob', role_path ~ '/files/*') }}"

- name: Bin | Install konsave command aliases
  ansible.builtin.file:
    src: "{{ bin_dest }}/konsavectl"
    dest: "{{ bin_dest }}/{{ item }}"
    state: link
    force: true
  loop: "{{ bin_konsave_links }}"

- name: Bin | Ensure ~/.config/homectl exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/homectl"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Bin | Deploy homectl config
  ansible.builtin.template:
    src: homectl-config.yml.j2
    dest: "{{ user_home }}/.config/homectl/config.yml"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  no_log: true
