---
- name: Account | Collect existing groups
  ansible.builtin.getent:
    database: group

- name: Account | Ensure user exists with correct groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: "{{ user_shell }}"
    groups: "{{ user_groups | select('in', ansible_facts.getent_group.keys()) | list }}"
    append: true
    state: present

- name: Account | Set root shell
  ansible.builtin.user:
    name: root
    shell: "{{ user_shell }}"

- name: Account | Ensure user home directory exists
  ansible.builtin.file:
    path: "{{ user_home }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Account | Ensure ~/.config exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Account | Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
