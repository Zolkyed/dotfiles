---
- name: Ensure zsh is installed
  ansible.builtin.package:
    name: zsh
    state: present

- name: Ensure user exists with correct shell and groups
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: "{{ user_shell }}"
    groups: "{{ user_groups }}"
    append: true
    state: present

- name: Ensure user home directory exists
  ansible.builtin.file:
    path: "{{ user_home }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
