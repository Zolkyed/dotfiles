---
- name: XDG | Create standard user directories
  ansible.builtin.command:
    cmd: xdg-user-dirs-update
  become: true
  become_user: "{{ user_name }}"
  changed_when: false

- name: XDG | Create Applications directory
  ansible.builtin.file:
    path: "{{ user_home }}/Applications"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: XDG | Ensure user config directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: XDG | Deploy mimeapps.list
  ansible.builtin.template:
    src: mimeapps.list.j2
    dest: "{{ user_home }}/.config/mimeapps.list"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: XDG | Configure xdg-terminal-exec preference
  ansible.builtin.copy:
    content: "{{ xdg_terminal_desktop }}\n"
    dest: "{{ user_home }}/.config/xdg-terminals.list"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

- name: XDG | Set KDE default terminal
  community.general.ini_file:
    path: "{{ user_home }}/.config/kdeglobals"
    section: General
    option: TerminalApplication
    value: "{{ xdg_terminal_command }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
