---
- name: Dotfiles | Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

- name: Dotfiles | Install chezmoi
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "{{ user_home }}/.local/bin"
    creates: "{{ chezmoi_bin }}"
  become: true
  become_user: "{{ user_name }}"

- name: Dotfiles | Ensure ~/.config is owned by {{ user_name }}
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0700"

- name: Dotfiles | Ensure chezmoi source directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/chezmoi"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0700"

- name: Dotfiles | Clone dotfiles repo
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ user_home }}/.local/share/chezmoi"
    version: "{{ dotfiles_repo_branch }}"
    update: false
  become: true
  become_user: "{{ user_name }}"
  when: dotfiles_use_repo

- name: Dotfiles | Sync chezmoi source from local path
  ansible.builtin.copy:
    src: "{{ dotfiles_chezmoi_source }}/"
    dest: "{{ user_home }}/.local/share/chezmoi/"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: preserve
  when: not dotfiles_use_repo

- name: Dotfiles | Apply dotfiles with chezmoi
  ansible.builtin.command:
    cmd: "{{ chezmoi_bin }} apply --no-tty --force --verbose"
  become: true
  become_user: "{{ user_name }}"
  register: chezmoi_apply
  changed_when: chezmoi_apply.stdout != ""
