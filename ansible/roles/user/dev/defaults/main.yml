---
# Languages / runtimes
dev_packages:
  - git
  - make
  - gcc
  - pkg-config
  - python3
  - python3-pip
  - python3-venv
  - pipx

# Node version manager
install_nvm: true
nvm_version: "0.40.3"

# Rust (via rustup)
install_rust: true

# Additional CLI dev tools
dev_cli_tools:
  - jq
  - yq
  - httpie
  - shellcheck
  - pre-commit
