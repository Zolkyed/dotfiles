# tasks/main.yml
---
- name: Install rclone
  ansible.builtin.package:
    name: rclone
    state: present

- name: Check if konsave is already installed via pipx
  ansible.builtin.stat:
    path: "{{ user_home }}/.local/bin/konsave"
  register: konsave_bin
  become: true
  become_user: "{{ user_name }}"

- name: Install konsave via pipx
  ansible.builtin.command:
    argv: [pipx, install, konsave]
  become: true
  become_user: "{{ user_name }}"
  when: not konsave_bin.stat.exists
  changed_when: true

- name: Check if konsave profile has already been applied
  ansible.builtin.stat:
    path: "{{ konsave_stamp_file }}"
  register: konsave_stamp
  become: true
  become_user: "{{ user_name }}"

- name: Restore KDE profile from Google Drive
  when: not konsave_stamp.stat.exists
  become: true
  become_user: "{{ user_name }}"
  block:
    - name: Ensure konsave download directory exists
      ansible.builtin.file:
        path: "{{ konsave_download_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure stamp file parent directory exists
      ansible.builtin.file:
        path: "{{ konsave_stamp_file | dirname }}"
        state: directory
        mode: "0755"

    - name: Verify rclone remote is configured
      ansible.builtin.command:
        argv: [rclone, listremotes]
      register: rclone_remotes
      changed_when: false
      failed_when: (konsave_rclone_remote + ':') not in rclone_remotes.stdout

    - name: Download konsave profile from Google Drive
      ansible.builtin.command:
        argv:
          - rclone
          - copy
          - --checksum          # only transfers if checksum differs
          - --progress
          - "{{ konsave_rclone_remote }}:{{ konsave_gdrive_path }}/{{ konsave_profile_file }}"
          - "{{ konsave_download_dir }}/"
      register: rclone_copy
      changed_when: rclone_copy.rc == 0

    - name: Check if profile name already imported into konsave
      ansible.builtin.command:
        argv: [konsave, --list-profiles]
      register: konsave_profiles
      changed_when: false
      failed_when: false

    - name: Import konsave profile
      ansible.builtin.command:
        argv:
          - konsave
          - --import-profile
          - "{{ konsave_download_dir }}/{{ konsave_profile_file }}"
          - --force             # overwrites if already imported, making it idempotent
      changed_when: true
      when: konsave_profile_name not in konsave_profiles.stdout

    - name: Apply konsave profile
      ansible.builtin.command:
        argv:
          - konsave
          - --apply
          - "{{ konsave_profile_name }}"
      changed_when: true

    - name: Mark konsave profile as applied
      ansible.builtin.file:
        path: "{{ konsave_stamp_file }}"
        state: touch
        mode: "0600"

  always:
    - name: Remove konsave download directory
      ansible.builtin.file:
        path: "{{ konsave_download_dir }}"
        state: absent
      become: true
      become_user: "{{ user_name }}"