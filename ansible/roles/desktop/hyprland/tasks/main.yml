---
- name: Install Hyprland and related packages
  ansible.builtin.package:
    name: "{{ hyprland_packages }}"
    state: present
  become: true

- name: Ensure hyprland config directory exists
  ansible.builtin.file:
    path: "{{ hyprland_config_dir }}"
    state: directory
    owner: "{{ user_name }}"
    mode: "0700"
  become: true
  become_user: "{{ user_name }}"

- name: Deploy hyprland.conf
  ansible.builtin.template:
    src: hyprland.conf.j2
    dest: "{{ hyprland_config_dir }}/hyprland.conf"
    owner: "{{ user_name }}"
    mode: "0600"
  become: true
  become_user: "{{ user_name }}"
