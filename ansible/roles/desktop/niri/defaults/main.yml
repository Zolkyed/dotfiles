---
desktop_niri_config_dir: "{{ user_home }}/.config/niri"
desktop_niri_kb_layout: us
desktop_monitors: []
# Keep these here as role defaults because the package names currently match
# across the supported distros. If Arch and Debian diverge later, move them to
# the distro group_vars files.
desktop_niri_packages:
  - niri
  - xdg-desktop-portal-wlr
  - waybar
  - kitty
  - rofi
  - dunst
  - mako
  - swaylock
  - swayidle
  - wl-clipboard
  - grim
  - slurp
  - brightnessctl
  - playerctl
  - network-manager-applet
  - pavucontrol
