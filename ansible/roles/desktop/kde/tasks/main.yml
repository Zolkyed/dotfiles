---
- name: Install KDE Plasma packages
  ansible.builtin.package:
    name: "{{ kde_packages }}"
    state: present

- name: Ensure KDE asset parent directories exist
  ansible.builtin.file:
    path: "{{ item.dest | dirname }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  loop: "{{ kde_managed_assets }}"
  when: kde_managed_assets | length > 0

- name: Install repo-managed KDE assets
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    directory_mode: "0755"
  become: false
  become_user: "{{ user_name }}"
  loop: "{{ kde_managed_assets }}"
  when: kde_managed_assets | length > 0

- name: Apply KDE config files
  community.general.kdeconfig:
    path: "{{ item.path }}"
    backup: true
    values: "{{ item.values }}"
  become: false
  become_user: "{{ user_name }}"
  loop: "{{ kde_config_files }}"
