---
- name: Restore KDE profile from Google Drive
  become: true
  become_user: "{{ user_name }}"
  block:
    - name: List available profiles on Google Drive
      ansible.builtin.command:
        argv:
          - rclone
          - lsf
          - "{{ desktop_konsave_rclone_remote }}:{{ desktop_konsave_gdrive_path }}/"
      register: desktop_gdrive_profiles
      changed_when: false

    - name: Show available profiles
      ansible.builtin.debug:
        var: desktop_gdrive_profiles.stdout_lines

    - name: Prompt for profile to restore
      ansible.builtin.pause:
        prompt: "Enter the profile name to restore (from the list above, without .knsv):"
      register: desktop_profile_prompt

    - name: Fail if no name entered
      ansible.builtin.fail:
        msg: "Profile name cannot be empty"
      when: desktop_profile_prompt.user_input | length == 0

    - name: Set profile name fact
      ansible.builtin.set_fact:
        desktop_konsave_profile_name: "{{ desktop_profile_prompt.user_input }}"

    - name: Ensure konsave download directory exists
      ansible.builtin.file:
        path: "{{ desktop_konsave_download_dir }}"
        state: directory
        mode: "0700"

    - name: Download konsave profile from Google Drive
      ansible.builtin.command:
        argv:
          - rclone
          - copy
          - --checksum
          - >-
            {{
              desktop_konsave_rclone_remote ~ ':' ~
              desktop_konsave_gdrive_path ~ '/' ~
              desktop_konsave_profile_name ~ '.knsv'
            }}
          - "{{ desktop_konsave_download_dir }}/"
      changed_when: false

    - name: Check if profile already imported into konsave
      ansible.builtin.command:
        argv: [konsave, -l]
      register: desktop_konsave_profiles
      changed_when: false
      failed_when: false

    - name: Import konsave profile
      ansible.builtin.command:
        argv:
          - konsave
          - -i
          - >-
            {{
              desktop_konsave_download_dir ~ '/' ~
              desktop_konsave_profile_name ~ '.knsv'
            }}
          - -f
      changed_when: true
      when: desktop_konsave_profile_name not in desktop_konsave_profiles.stdout

    - name: Apply konsave profile
      ansible.builtin.command:
        argv:
          - konsave
          - -a
          - "{{ desktop_konsave_profile_name }}"
      changed_when: true

    - name: Apply keybind overrides after konsave import
      ansible.builtin.include_role:
        name: desktop/kde/keybinds

  always:
    - name: Remove konsave download directory
      ansible.builtin.file:
        path: "{{ desktop_konsave_download_dir }}"
        state: absent
